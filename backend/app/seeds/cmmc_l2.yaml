  - id: AC.L2-3.1.1
    seq: 1
    family: AC
    title: Authorized Access Control
    weight: 5
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.1; NIST SP 800-171A 3.1.1; CMMC AG L2 v2 AC.L2-3.1.1"
    req: >-
      Limit system access to authorized users, processes acting on behalf of
      authorized users, and devices (including other systems).
    objectives:
      - key: a
        text: Authorized users of the system are identified.
        type: document_list
      - key: b
        text: Processes acting on behalf of authorized users are identified.
        type: narrative
      - key: c
        text: Devices (and other systems) authorized to connect to the system are identified.
        type: document_list
      - key: d
        text: System access is limited to authorized users.
        type: product
      - key: e
        text: System access is limited to processes acting on behalf of authorized users.
        type: product
      - key: f
        text: System access is limited to devices (including other systems).
        type: product
      - key: g
        text: System access is limited to the types of transactions and functions that authorized users are permitted to execute.
        type: product

  - id: AC.L2-3.1.2
    seq: 2
    family: AC
    title: Transaction and Function Control
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.2; NIST SP 800-171A 3.1.2; CMMC AG L2 v2 AC.L2-3.1.2"
    req: >-
      Limit system access to the types of transactions and functions that
      authorized users are permitted to execute.
    objectives:
      - key: a
        text: The types of transactions and functions that authorized users are permitted to execute are defined.
        type: narrative
      - key: b
        text: System access is limited to the defined types of transactions and functions for authorized users.
        type: product

  - id: AC.L2-3.1.3
    seq: 3
    family: AC
    title: Control CUI Flow
    weight: 5
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.3; NIST SP 800-171A 3.1.3; CMMC AG L2 v2 AC.L2-3.1.3"
    req: >-
      Control the flow of CUI in accordance with approved authorizations.
    objectives:
      - key: a
        text: Information flow control policies are defined.
        type: narrative
      - key: b
        text: Approved authorizations for controlling the flow of CUI within the system and between interconnected systems are identified.
        type: narrative
      - key: c
        text: CUI flow is controlled in accordance with approved authorizations.
        type: product

  - id: AC.L2-3.1.4
    seq: 4
    family: AC
    title: Separation of Duties
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.4; NIST SP 800-171A 3.1.4; CMMC AG L2 v2 AC.L2-3.1.4"
    req: >-
      Separate the duties of individuals to reduce the risk of malevolent
      activity without collusion.
    objectives:
      - key: a
        text: The duties of individuals requiring separation are defined.
        type: narrative
      - key: b
        text: Responsibilities for duties requiring separation are assigned to separate individuals.
        type: document_list
      - key: c
        text: Access authorizations that support separation of duties are established and enforced.
        type: product

  - id: AC.L2-3.1.5
    seq: 5
    family: AC
    title: Least Privilege
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.5; NIST SP 800-171A 3.1.5; CMMC AG L2 v2 AC.L2-3.1.5"
    req: >-
      Employ the principle of least privilege, including for specific security
      functions and privileged accounts.
    objectives:
      - key: a
        text: Privileged accounts are identified.
        type: document_list
      - key: b
        text: Access to privileged accounts is authorized only to individuals required to perform privileged functions.
        type: product
      - key: c
        text: Privileged functions are identified.
        type: narrative
      - key: d
        text: Security functions assigned to privileged roles are identified.
        type: narrative

  - id: AC.L2-3.1.6
    seq: 6
    family: AC
    title: Non-Privileged Account Use
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.6; NIST SP 800-171A 3.1.6; CMMC AG L2 v2 AC.L2-3.1.6"
    req: >-
      Use non-privileged accounts or roles when accessing non-security functions.
    objectives:
      - key: a
        text: Non-security functions accessible from privileged accounts or roles are identified.
        type: narrative
      - key: b
        text: Users are required to use non-privileged accounts when accessing non-security functions.
        type: product

  - id: AC.L2-3.1.7
    seq: 7
    family: AC
    title: Privileged Functions Audit
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.7; NIST SP 800-171A 3.1.7; CMMC AG L2 v2 AC.L2-3.1.7"
    req: >-
      Prevent non-privileged users from executing privileged functions and
      capture the execution of such functions in audit logs.
    objectives:
      - key: a
        text: Privileged functions are defined.
        type: narrative
      - key: b
        text: Non-privileged users are prevented from executing privileged functions.
        type: product
      - key: c
        text: The execution of privileged functions is captured in audit logs.
        type: product

  - id: AC.L2-3.1.8
    seq: 8
    family: AC
    title: Unsuccessful Logon Attempts
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.8; NIST SP 800-171A 3.1.8; CMMC AG L2 v2 AC.L2-3.1.8"
    req: >-
      Limit unsuccessful logon attempts.
    objectives:
      - key: a
        text: The means of limiting unsuccessful logon attempts are defined.
        type: narrative
      - key: b
        text: Unsuccessful logon attempts are limited in accordance with defined means.
        type: product

  - id: AC.L2-3.1.9
    seq: 9
    family: AC
    title: Privacy and Security Notices
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.9; NIST SP 800-171A 3.1.9; CMMC AG L2 v2 AC.L2-3.1.9"
    req: >-
      Provide privacy and security notices consistent with CUI rules.
    objectives:
      - key: a
        text: Privacy and security notices required by CUI rules are identified, consistent with applicable CUI rules.
        type: narrative
      - key: b
        text: Privacy and security notices are displayed on the system.
        type: product

  - id: AC.L2-3.1.10
    seq: 10
    family: AC
    title: Session Lock
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.10; NIST SP 800-171A 3.1.10; CMMC AG L2 v2 AC.L2-3.1.10"
    req: >-
      Use session lock with pattern-hiding displays after a period of inactivity.
    objectives:
      - key: a
        text: The period of inactivity after which a session lock is initiated is defined.
        type: narrative
      - key: b
        text: A session lock is initiated after the defined period of inactivity.
        type: product
      - key: c
        text: The session lock is retained until the user re-establishes access via established identification and authentication procedures.
        type: product

  - id: AC.L2-3.1.11
    seq: 11
    family: AC
    title: Session Termination
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.11; NIST SP 800-171A 3.1.11; CMMC AG L2 v2 AC.L2-3.1.11"
    req: >-
      Terminate (automatically) user sessions after a defined condition.
    objectives:
      - key: a
        text: Conditions that require automatic user session termination are defined.
        type: narrative
      - key: b
        text: User sessions are automatically terminated after defined conditions are met.
        type: product

  - id: AC.L2-3.1.12
    seq: 12
    family: AC
    title: Remote Access Monitoring
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.12; NIST SP 800-171A 3.1.12; CMMC AG L2 v2 AC.L2-3.1.12"
    req: >-
      Monitor and control remote access sessions.
    objectives:
      - key: a
        text: Remote access sessions are authorized.
        type: narrative
      - key: b
        text: Remote access sessions are monitored.
        type: product
      - key: c
        text: Remote access sessions are controlled.
        type: product

  - id: AC.L2-3.1.13
    seq: 13
    family: AC
    title: Remote Access Cryptography
    weight: 5
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.13; NIST SP 800-171A 3.1.13; CMMC AG L2 v2 AC.L2-3.1.13"
    req: >-
      Employ cryptographic mechanisms to protect the confidentiality of remote
      access sessions.
    objectives:
      - key: a
        text: Cryptographic mechanisms to protect the confidentiality of remote access sessions are implemented.
        type: product

  - id: AC.L2-3.1.14
    seq: 14
    family: AC
    title: Remote Access Control Points
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.14; NIST SP 800-171A 3.1.14; CMMC AG L2 v2 AC.L2-3.1.14"
    req: >-
      Route remote access via managed access control points.
    objectives:
      - key: a
        text: Remote access is routed through managed access control points.
        type: product

  - id: AC.L2-3.1.15
    seq: 15
    family: AC
    title: Remote Privileged Commands
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.15; NIST SP 800-171A 3.1.15; CMMC AG L2 v2 AC.L2-3.1.15"
    req: >-
      Authorize remote execution of privileged commands and access to
      security-relevant information via remote access only for documented
      operational needs.
    objectives:
      - key: a
        text: Privileged commands authorized for remote execution are identified and documented.
        type: narrative
      - key: b
        text: Security-relevant information authorized for remote access is identified and documented.
        type: narrative
      - key: c
        text: Remote execution of privileged commands is limited to documented operational needs.
        type: product

  - id: AC.L2-3.1.16
    seq: 16
    family: AC
    title: Wireless Authorization
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.16; NIST SP 800-171A 3.1.16; CMMC AG L2 v2 AC.L2-3.1.16"
    req: >-
      Authorize wireless access prior to allowing such connections.
    objectives:
      - key: a
        text: Wireless access points are identified.
        type: document_list
      - key: b
        text: Wireless access to the system is authorized prior to allowing wireless connections.
        type: narrative

  - id: AC.L2-3.1.17
    seq: 17
    family: AC
    title: Wireless Access Protection
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.17; NIST SP 800-171A 3.1.17; CMMC AG L2 v2 AC.L2-3.1.17"
    req: >-
      Protect wireless access using authentication and encryption.
    objectives:
      - key: a
        text: Wireless access is protected using authentication.
        type: product
      - key: b
        text: Wireless access is protected using encryption.
        type: product

  - id: AC.L2-3.1.18
    seq: 18
    family: AC
    title: Mobile Device Control
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.18; NIST SP 800-171A 3.1.18; CMMC AG L2 v2 AC.L2-3.1.18"
    req: >-
      Control connection of mobile devices.
    objectives:
      - key: a
        text: Mobile devices that process, store, or transmit CUI are identified.
        type: document_list
      - key: b
        text: Connection of mobile devices to the system is controlled.
        type: product

  - id: AC.L2-3.1.19
    seq: 19
    family: AC
    title: Encrypt CUI on Mobile
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.19; NIST SP 800-171A 3.1.19; CMMC AG L2 v2 AC.L2-3.1.19"
    req: >-
      Encrypt CUI on mobile devices and mobile computing platforms.
    objectives:
      - key: a
        text: CUI on mobile devices and mobile computing platforms is encrypted.
        type: product

  - id: AC.L2-3.1.20
    seq: 20
    family: AC
    title: External System Connections
    weight: 3
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.20; NIST SP 800-171A 3.1.20; CMMC AG L2 v2 AC.L2-3.1.20"
    req: >-
      Verify and control/limit connections to external systems.
    objectives:
      - key: a
        text: Connections to external systems are identified.
        type: document_list
      - key: b
        text: The use of external systems by authorized individuals is verified and controlled/limited.
        type: narrative
      - key: c
        text: Individuals authorized to use external systems to access the system are identified.
        type: document_list

  - id: AC.L2-3.1.21
    seq: 21
    family: AC
    title: Portable Storage on External Systems
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.21; NIST SP 800-171A 3.1.21; CMMC AG L2 v2 AC.L2-3.1.21"
    req: >-
      Limit use of portable storage devices on external systems.
    objectives:
      - key: a
        text: The use of portable storage devices on external systems is limited or prohibited.
        type: product

  - id: AC.L2-3.1.22
    seq: 22
    family: AC
    title: Publicly Accessible Systems
    weight: 1
    source: "NIST SP 800-171 Rev 2 Г‚В§3.1.22; NIST SP 800-171A 3.1.22; CMMC AG L2 v2 AC.L2-3.1.22"
    req: >-
      Control CUI posted or processed on publicly accessible systems.
    objectives:
      - key: a
        text: Individuals authorized to post information on publicly accessible systems are designated.
        type: document_list
      - key: b
        text: Designated individuals review publicly accessible system content for non-public CUI prior to posting.
        type: scheduled_operation
        cadence: quarterly
        cadence_resp: shared
      - key: c
        text: Non-public CUI is removed from publicly accessible systems when discovered.
        type: narrative

