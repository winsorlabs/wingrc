    req: >-
      Ensure that managers, systems administrators, and users of organizational
      systems are made aware of the security risks associated with their
      activities and of the applicable policies, standards, and procedures
      related to the security of those systems.
    objectives:
      - key: a
        text: Security awareness training content covering associated security risks is identified.
        type: narrative
      - key: b
