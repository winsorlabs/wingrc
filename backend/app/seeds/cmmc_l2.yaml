framework:
  key: nist-800-171-r2
  name: NIST SP 800-171 Rev 2
  version: r2
controls:
- id: AC.L2-3.1.1
  seq: 1
  family: AC
  title: Authorized Access Control
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.1; NIST SP 800-171A 3.1.1; CMMC AG L2 v2 AC.L2-3.1.1"
  req: Limit system access to authorized users, processes acting on behalf of authorized users, and devices
    (including other systems).
  objectives:
  - key: a
    text: Authorized users are identified.
    type: document_list
    guidance: 'Examine: access control policy; list of authorized users and devices; system security plan.
      Interview: personnel responsible for access control.'
  - key: b
    text: Processes acting on behalf of authorized users are identified.
    type: narrative
  - key: c
    text: Devices (and other systems) authorized to connect to the system are identified.
    type: document_list
  - key: d
    text: System access is limited to authorized users.
    type: product
    guidance: 'Examine: access control configurations; system security settings. Test: attempt access
      with unauthorized credentials to verify enforcement.'
  - key: e
    text: System access is limited to processes acting on behalf of authorized users.
    type: product
  - key: f
    text: System access is limited to authorized devices (including other systems).
    type: product
  discussion: Access control policies and procedures address the requirements in applicable laws, directives,
    regulations, standards, and mission and business needs. Authorized users, processes acting on behalf
    of users, and devices are identified by the organization; access to the system is constrained to those
    identified entities. Identification of authorized users can be accomplished through access control
    lists, user directories, or other means. Access enforcement mechanisms constrain the logical and physical
    access of authorized users to specific functions, ports, protocols, and services.
- id: AC.L2-3.1.2
  seq: 2
  family: AC
  title: Transaction and Function Control
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.2; NIST SP 800-171A 3.1.2; CMMC AG L2 v2 AC.L2-3.1.2"
  req: Limit system access to the types of transactions and functions that authorized users are permitted
    to execute.
  objectives:
  - key: a
    text: The types of transactions and functions that authorized users are permitted to execute are defined.
    type: narrative
    guidance: 'Examine: access control policy; documentation of permitted transaction types and functions
      per user role.'
  - key: b
    text: System access is limited to the defined types of transactions and functions for authorized users.
    type: product
  discussion: Organizations may choose to define access privileges or other attributes by account, by
    type of account, or by a combination. System account types include individual, shared, group, system,
    anonymous, guest, emergency, developer, manufacturer, vendor, and temporary. Other attributes required
    for authorizing access include restrictions on time-of-day, day-of-week, and point-of-origin. In defining
    other account attributes, organizations consider system-related requirements and mission or business
    requirements.
- id: AC.L2-3.1.3
  seq: 3
  family: AC
  title: Control CUI Flow
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.3; NIST SP 800-171A 3.1.3; CMMC AG L2 v2 AC.L2-3.1.3"
  req: Control the flow of CUI in accordance with approved authorizations.
  objectives:
  - key: a
    text: Information flow control policies are defined.
    type: narrative
    guidance: 'Examine: information flow control policy; system security plan; network diagrams showing
      CUI flow paths.'
  - key: b
    text: Methods and enforcement mechanisms for controlling the flow of CUI are defined.
    type: narrative
  - key: c
    text: Designated sources and destinations (e.g., networks, individuals, and devices) for CUI within
      the system and between interconnected systems are identified.
    type: product
  - key: d
    text: Authorizations for controlling the flow of CUI are defined.
    type: narrative
  - key: e
    text: Approved authorizations for controlling the flow of CUI are enforced.
    type: narrative
  discussion: Information flow control regulates where information can travel within a system and between
    systems (in contrast to who is allowed to access the information). Flow control restrictions include
    keeping export-controlled information from being transmitted in the clear to the Internet, blocking
    outside traffic that claims to be from within the organization, and limiting information transfers
    between organizations based on data structures and content. Organizations commonly use information
    flow control policies and enforcement mechanisms to control the flow of information between designated
    sources and destinations within systems and between interconnected systems.
- id: AC.L2-3.1.4
  seq: 4
  family: AC
  title: Separation of Duties
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.4; NIST SP 800-171A 3.1.4; CMMC AG L2 v2 AC.L2-3.1.4"
  req: Separate the duties of individuals to reduce the risk of malevolent activity without collusion.
  objectives:
  - key: a
    text: The duties of individuals requiring separation are defined.
    type: narrative
    guidance: 'Examine: access control policy; separation of duties documentation; assignment of duties
      to separate individuals.'
  - key: b
    text: Responsibilities for duties that require separation are assigned to separate individuals.
    type: document_list
  - key: c
    text: Access privileges that enable individuals to exercise the duties that require separation are
      granted to separate individuals.
    type: product
  discussion: Separation of duties addresses the potential for abuse of authorized privileges and helps
    reduce the risk of malevolent activity without collusion. Separation of duties includes dividing mission
    or business functions among different individuals or roles; conducting system support functions with
    different individuals; ensuring security personnel who administer access control do not also administer
    audit functions; and ensuring different individuals manage acquisition, data entry, verification,
    authorization, and maintenance.
- id: AC.L2-3.1.5
  seq: 5
  family: AC
  title: Least Privilege
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.1.5; NIST SP 800-171A 3.1.5; CMMC AG L2 v2 AC.L2-3.1.5"
  req: Employ the principle of least privilege, including for specific security functions and privileged
    accounts.
  objectives:
  - key: a
    text: Privileged accounts are identified.
    type: document_list
    guidance: 'Examine: access control policy; list of privileged accounts; account management records.'
  - key: b
    text: Access to privileged accounts is authorized in accordance with the principle of least privilege.
    type: product
  - key: c
    text: Security functions are identified.
    type: narrative
  - key: d
    text: Access to security functions is authorized in accordance with the principle of least privilege.
    type: narrative
  discussion: Processes, programs, and accounts operating at privilege levels above standard user are
    referred to as privileged. Organizations should provide individuals with the least privilege needed
    to accomplish assigned tasks and consistent with organizational missions. The principle of least privilege
    also applies to system processes, ensuring that processes operate at privilege levels no higher than
    necessary to accomplish required organizational missions or business functions.
- id: AC.L2-3.1.6
  seq: 6
  family: AC
  title: Non-Privileged Account Use
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.6; NIST SP 800-171A 3.1.6; CMMC AG L2 v2 AC.L2-3.1.6"
  req: Use non-privileged accounts or roles when accessing non-security functions.
  objectives:
  - key: a
    text: Nonsecurity functions are identified.
    type: narrative
    guidance: 'Examine: access control policy; documentation of nonsecurity functions; system configuration
      settings.'
  - key: b
    text: Users are required to use non-privileged accounts or roles when accessing nonsecurity functions.
    type: product
  discussion: This requirement is intended to limit exposure when operating from within privileged accounts
    or roles. The inclusion of roles addresses situations where organizations implement access control
    policies such as role-based access control, and the inherent danger in continuing to operate in the
    same session after transitioning from a privileged role to a non-privileged role. Requiring the use
    of non-privileged accounts for non-security functions reduces exposure when privileged accounts are
    not needed.
- id: AC.L2-3.1.7
  seq: 7
  family: AC
  title: Privileged Functions Audit
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.7; NIST SP 800-171A 3.1.7; CMMC AG L2 v2 AC.L2-3.1.7"
  req: Prevent non-privileged users from executing privileged functions and capture the execution of such
    functions in audit logs.
  objectives:
  - key: a
    text: Privileged functions are defined.
    type: narrative
    guidance: 'Examine: access control policy; definition of privileged functions; audit logs showing
      privileged function execution.'
  - key: b
    text: Non-privileged users are defined.
    type: product
  - key: c
    text: Non-privileged users are prevented from executing privileged functions.
    type: product
  - key: d
    text: The execution of privileged functions is captured in audit logs.
    type: narrative
  discussion: Privileged functions include establishing system accounts, performing system integrity checks,
    conducting patching operations, or administering cryptographic key management activities. Misuse of
    privileged functions, whether intentional or unintentional, can have significant adverse impacts.
    Logging the use of privileged functions is one way to detect such misuse and help mitigate the risk
    from insider threats and advanced persistent threats.
- id: AC.L2-3.1.8
  seq: 8
  family: AC
  title: Unsuccessful Logon Attempts
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.8; NIST SP 800-171A 3.1.8; CMMC AG L2 v2 AC.L2-3.1.8"
  req: Limit unsuccessful logon attempts.
  objectives:
  - key: a
    text: The means of limiting unsuccessful logon attempts is defined.
    type: narrative
    guidance: 'Examine: access control policy; system configuration settings for logon attempts; account
      lockout configuration.'
  - key: b
    text: The defined means of limiting unsuccessful logon attempts is implemented.
    type: product
  discussion: This requirement applies to systems that are either privately owned or commercially provided.
    Unsuccessful logon attempts may not be applicable to certain systems or components. The lock out condition
    should be carefully considered and should not be overly restrictive to the point of impeding mission
    operations. Specifications for the number of consecutive invalid access attempts, the time period
    for recording such attempts, and the lock out period should be consistent with organizational security
    policies.
- id: AC.L2-3.1.9
  seq: 9
  family: AC
  title: Privacy and Security Notices
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.9; NIST SP 800-171A 3.1.9; CMMC AG L2 v2 AC.L2-3.1.9"
  req: Provide privacy and security notices consistent with CUI rules.
  objectives:
  - key: a
    text: Privacy and security notices required by CUI-specified rules are identified, consistent, and
      associated with the specific CUI category.
    type: narrative
    guidance: 'Examine: privacy and security notices displayed at logon; documentation of CUI-specified
      notice requirements.'
  - key: b
    text: Privacy and security notices are displayed.
    type: product
  discussion: Notification messages for systems can be implemented as warning messages that are displayed
    before logons. Session messages can be displayed after successful logons. Organizations consult with
    the Office of the General Counsel regarding the content of privacy and security notices and disclaimers
    for federal systems. The use of security notices and warnings serves as both an authorization statement
    and a deterrent to unauthorized use.
- id: AC.L2-3.1.10
  seq: 10
  family: AC
  title: Session Lock
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.10; NIST SP 800-171A 3.1.10; CMMC AG L2 v2 AC.L2-3.1.10"
  req: Use session lock with pattern-hiding displays after a period of inactivity.
  objectives:
  - key: a
    text: The period of inactivity after which the system initiates a session lock is defined.
    type: narrative
    guidance: 'Examine: configuration settings for session lock period; system security plan documenting
      inactivity timeout.'
  - key: b
    text: Access to the system and viewing of data is prevented by initiating a session lock after the
      defined period of inactivity.
    type: product
  - key: c
    text: Previously visible information is concealed via a pattern-hiding display after the defined period
      of inactivity.
    type: product
  discussion: An automatic session lock is a temporary action taken when a user stops work and moves away
    from the system but does not want to log out because of the temporary nature of the absence. The automatic
    session lock is potentially complemented by a session logout capability for longer absences. Pattern-hiding
    displays can include static or dynamic images, or blank screens, to prevent casual observation of
    display screen contents.
- id: AC.L2-3.1.11
  seq: 11
  family: AC
  title: Session Termination
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.11; NIST SP 800-171A 3.1.11; CMMC AG L2 v2 AC.L2-3.1.11"
  req: Terminate (automatically) user sessions after a defined condition.
  objectives:
  - key: a
    text: Conditions requiring a user session to terminate are defined.
    type: narrative
    guidance: 'Examine: configuration settings for session termination; documentation of conditions for
      session termination.'
  - key: b
    text: A user session is automatically terminated after any of the defined conditions occur.
    type: product
  discussion: This requirement ensures that active sessions are terminated when they are no longer needed
    -- for example, after certain conditions have been met, or when sessions exceed defined limits. Terminating
    inactive sessions reduces the window of opportunity for adversaries to hijack active sessions. Conditions
    for terminating sessions include a period of inactivity, targeted responses to certain types of incidents,
    and time-of-day restrictions on system use.
- id: AC.L2-3.1.12
  seq: 12
  family: AC
  title: Remote Access Monitoring
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.1.12; NIST SP 800-171A 3.1.12; CMMC AG L2 v2 AC.L2-3.1.12"
  req: Monitor and control remote access sessions.
  objectives:
  - key: a
    text: Remote access sessions are permitted.
    type: narrative
    guidance: 'Examine: remote access policy; documentation of permitted remote access types; network
      diagrams.'
  - key: b
    text: The types of permitted remote access are identified.
    type: product
  - key: c
    text: Remote access sessions are controlled.
    type: product
  - key: d
    text: Remote access sessions are monitored.
    type: narrative
  discussion: Monitoring and control of remote access sessions addresses authorization prior to allowing
    remote connections, the need to protect communications paths, and the need for monitoring during remote
    access sessions. Remote access controls apply to systems accessed through external networks. Examples
    include mobile devices, individually owned devices used to access organizational information, and
    systems accessed through external networks. Remote access controls for telework apply to portable
    computing devices used in a telework environment.
- id: AC.L2-3.1.13
  seq: 13
  family: AC
  title: Remote Access Cryptography
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.1.13; NIST SP 800-171A 3.1.13; CMMC AG L2 v2 AC.L2-3.1.13"
  req: Employ cryptographic mechanisms to protect the confidentiality of remote access sessions.
  objectives:
  - key: a
    text: Cryptographic mechanisms to protect the confidentiality of remote access sessions are identified.
    type: product
    guidance: 'Examine: remote access policy; configuration of cryptographic mechanisms for remote sessions;
      VPN or TLS configuration.'
  - key: b
    text: Cryptographic mechanisms to protect the confidentiality of remote access sessions are implemented.
    type: narrative
  discussion: Cryptographic mechanisms used to protect the confidentiality of information during remote
    access sessions include Transport Layer Security (TLS) and IPsec. The security strength of cryptographic
    mechanisms is determined by applicable FIPS and NIST guidelines. Organizations also consider the use
    of secure shell (SSH) for command line access and similar functions. Strong cryptographic protections
    prevent unauthorized disclosure of session data in transit.
- id: AC.L2-3.1.14
  seq: 14
  family: AC
  title: Remote Access Control Points
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.14; NIST SP 800-171A 3.1.14; CMMC AG L2 v2 AC.L2-3.1.14"
  req: Route remote access via managed access control points.
  objectives:
  - key: a
    text: Managed access control points are identified and implemented.
    type: product
    guidance: 'Examine: network architecture documentation; configuration of managed access control points;
      firewall rules.'
  - key: b
    text: Remote access is routed through managed network access control points.
    type: narrative
  discussion: Routing remote access connections through managed access control points enhances explicit,
    organizational control over such connections, reducing the susceptibility to unauthorized access to
    organizational information systems. This approach allows the organization to inspect and filter remote
    access traffic in a consistent manner and provides visibility into remote connections for security
    monitoring purposes.
- id: AC.L2-3.1.15
  seq: 15
  family: AC
  title: Remote Privileged Commands
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.15; NIST SP 800-171A 3.1.15; CMMC AG L2 v2 AC.L2-3.1.15"
  req: Authorize remote execution of privileged commands and access to security-relevant information via
    remote access only for documented operational needs.
  objectives:
  - key: a
    text: Privileged commands authorized for remote execution are identified.
    type: narrative
    guidance: 'Examine: access control policy; documentation of privileged commands authorized for remote
      execution.'
  - key: b
    text: Security-relevant information authorized to be accessed remotely is identified.
    type: narrative
  - key: c
    text: The execution of the identified privileged commands via remote access is authorized.
    type: product
  - key: d
    text: Access to the identified security-relevant information via remote access is authorized.
    type: narrative
  discussion: Organizations typically use encrypted virtual private networks (VPNs) to protect confidentiality
    and integrity of data transmitted over the Internet. Remote execution of privileged commands and access
    to security-relevant information creates significant risks if not appropriately controlled. Authorizing
    only documented, operationally necessary remote privileged commands reduces the attack surface available
    to adversaries who may compromise remote access mechanisms.
- id: AC.L2-3.1.16
  seq: 16
  family: AC
  title: Wireless Authorization
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.1.16; NIST SP 800-171A 3.1.16; CMMC AG L2 v2 AC.L2-3.1.16"
  req: Authorize wireless access prior to allowing such connections.
  objectives:
  - key: a
    text: Wireless access points are identified.
    type: document_list
    guidance: 'Examine: wireless access policy; list of authorized wireless access points; documentation
      of wireless authorization.'
  - key: b
    text: Wireless access is authorized prior to allowing such connections.
    type: narrative
  discussion: Wireless technologies include microwave, packet radio (UHF/VHF), 802.11x, and Bluetooth.
    Wireless networks use authentication protocols that provide credential protection and mutual authentication.
    Organizations authenticate individuals and devices to protect wireless access to the system. Special
    attention is given to the wide variety of devices that are part of the Internet of Things with potential
    wireless access to organizational systems.
- id: AC.L2-3.1.17
  seq: 17
  family: AC
  title: Wireless Access Protection
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.1.17; NIST SP 800-171A 3.1.17; CMMC AG L2 v2 AC.L2-3.1.17"
  req: Protect wireless access using authentication and encryption.
  objectives:
  - key: a
    text: Wireless access to the system is protected using authentication.
    type: product
    guidance: 'Examine: wireless access configuration; authentication protocol settings; encryption configuration
      for wireless access.'
  - key: b
    text: Wireless access to the system is protected using encryption.
    type: product
  discussion: Cryptographic mechanisms for protecting the confidentiality and integrity of information
    flowing across wireless networks include authentication protocols such as WPA2/WPA3 when configured
    appropriately. Authentication protocols should be FIPS-validated and meet standards for encryption
    strength. Organizations select wireless security protocols and configurations based on the sensitivity
    of the data being transmitted and the threat environment.
- id: AC.L2-3.1.18
  seq: 18
  family: AC
  title: Mobile Device Control
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.1.18; NIST SP 800-171A 3.1.18; CMMC AG L2 v2 AC.L2-3.1.18"
  req: Control connection of mobile devices.
  objectives:
  - key: a
    text: Mobile devices that process, store, or transmit CUI are identified.
    type: document_list
    guidance: 'Examine: mobile device policy; inventory of mobile devices processing CUI; mobile device
      management configuration.'
  - key: b
    text: Mobile device connections are authorized.
    type: product
  - key: c
    text: Mobile device connections are monitored and logged.
    type: narrative
  discussion: A mobile device is a computing device that has a small form factor, is designed to operate
    without a physical connection, possesses local data storage, and includes a self-contained power source.
    Mobile devices may also include voice communication capabilities, on-board sensors, or built-in features
    for synchronizing local data with remote locations. Mobile operating systems may limit the availability
    of organization-controlled configuration settings.
- id: AC.L2-3.1.19
  seq: 19
  family: AC
  title: Encrypt CUI on Mobile
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.1.19; NIST SP 800-171A 3.1.19; CMMC AG L2 v2 AC.L2-3.1.19"
  req: Encrypt CUI on mobile devices and mobile computing platforms.
  objectives:
  - key: a
    text: Mobile devices and mobile computing platforms that process, store, or transmit CUI are identified.
    type: product
    guidance: 'Examine: mobile device policy; encryption configuration on mobile devices; verification
      of FIPS-validated encryption.'
  - key: b
    text: Encryption is employed to protect CUI on identified mobile devices and mobile computing platforms.
    type: narrative
  discussion: Organizations use cryptographic mechanisms to prevent unauthorized disclosure of information
    during transport by encrypting the information on the mobile device. Encrypting information on all
    mobile devices such as smartphones, tablets, and e-readers protects the information if a mobile device
    is lost or stolen. FIPS-validated cryptographic modules should be used when encrypting CUI on mobile
    devices.
- id: AC.L2-3.1.20
  seq: 20
  family: AC
  title: External System Connections
  weight: 1
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.20; NIST SP 800-171A 3.1.20; CMMC AG L2 v2 AC.L2-3.1.20"
  req: Verify and control/limit connections to external systems.
  objectives:
  - key: a
    text: Connections to external systems are identified.
    type: document_list
    guidance: 'Examine: external system connection agreements; list of identified external system connections;
      system security plan.'
  - key: b
    text: The use of external systems is identified.
    type: narrative
  - key: c
    text: Connections to external systems are verified.
    type: document_list
  - key: d
    text: The use of external systems is verified.
    type: narrative
  - key: e
    text: Connections to external systems are controlled/limited.
    type: narrative
  - key: f
    text: The use of external systems is controlled/limited.
    type: narrative
  discussion: External systems are systems or components for which organizations typically have no direct
    supervision and authority over the application of required security controls. Examples of external
    systems include personally-owned systems, medical devices, wearable items, and systems belonging to
    government contractors or academic institutions. Organizations establish terms and conditions for
    use of external systems and monitor and control connections to those systems.
- id: AC.L2-3.1.21
  seq: 21
  family: AC
  title: Portable Storage on External Systems
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.21; NIST SP 800-171A 3.1.21; CMMC AG L2 v2 AC.L2-3.1.21"
  req: Limit use of portable storage devices on external systems.
  objectives:
  - key: a
    text: The use of portable storage devices containing CUI on external systems is identified and documented.
    type: product
    guidance: 'Examine: portable storage device policy; records of portable storage device use on external
      systems.'
  - key: b
    text: Limits on the use of portable storage devices containing CUI on external systems are defined.
    type: narrative
  - key: c
    text: The use of portable storage devices containing CUI on external systems is limited as defined.
    type: narrative
  discussion: Limits on use of organization-controlled portable storage devices in external systems include
    complete prohibition of the use of such devices or restrictions on how the devices may be used and
    under what conditions. CUI on portable storage devices poses risk because these devices can be lost
    or stolen, and because data may be transferred from organizational systems to external systems through
    such devices without appropriate controls.
- id: AC.L2-3.1.22
  seq: 22
  family: AC
  title: Publicly Accessible Systems
  weight: 1
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.1.22; NIST SP 800-171A 3.1.22; CMMC AG L2 v2 AC.L2-3.1.22"
  req: Control CUI posted or processed on publicly accessible systems.
  objectives:
  - key: b
    text: Procedures to ensure CUI is not posted or processed on publicly accessible systems are identified.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: shared
    guidance: 'Examine: procedures for reviewing publicly accessible content; training records for individuals
      authorized to post content.'
  - key: c
    text: A review process is in place prior to posting of any content to publicly accessible systems.
    type: narrative
  - key: d
    text: Content on publicly accessible systems is reviewed to ensure that it does not include CUI.
    type: narrative
  - key: e
    text: Mechanisms are in place to remove and address improper posting of CUI.
    type: narrative
  discussion: In accordance with laws, Executive Orders, directives, policies, and standards, the public
    is not authorized access to nonpublic information such as information protected under the Privacy
    Act, CUI, and proprietary information. This requirement addresses systems that are controlled by the
    organization and accessible to the public, typically without identification or authentication. Individuals
    authorized to post information on publicly accessible systems are trained on what constitutes CUI.
- id: AT.L2-3.2.1
  seq: 23
  family: AT
  title: Security Awareness
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.2.1; NIST SP 800-171A 3.2.1; CMMC AG L2 v2 AT.L2-3.2.1"
  req: Ensure that managers, systems administrators, and users of organizational systems are made aware
    of the security risks associated with their activities and of the applicable policies, standards,
    and procedures related to the security of those systems.
  objectives:
  - key: a
    text: Security risks associated with organizational activities involving CUI are identified.
    type: narrative
    guidance: 'Examine: security awareness training materials; documentation of security risks associated
      with CUI handling.'
  - key: b
    text: Policies, standards, and procedures related to the security of the system are identified.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
  - key: c
    text: Managers, systems administrators, and users of the system are made aware of the security risks
      associated with their activities.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
  - key: d
    text: Managers, systems administrators, and users of the system are made aware of the applicable policies,
      standards, and procedures related to the security of the system.
    type: narrative
  discussion: Organizations determine the appropriate content of security awareness training based on
    the specific requirements of the organization and the systems to which personnel have authorized access.
    The content includes a basic understanding of the need for information security and user actions to
    maintain security and to respond to suspected security incidents. The content also addresses awareness
    of the need for operations security and the potential consequences of failing to protect CUI.
- id: AT.L2-3.2.2
  seq: 24
  family: AT
  title: Role-Based Training
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.2.2; NIST SP 800-171A 3.2.2; CMMC AG L2 v2 AT.L2-3.2.2"
  req: Ensure that personnel are trained to carry out their assigned information security responsibilities.
  objectives:
  - key: a
    text: Information security-related duties, roles, and responsibilities are defined.
    type: document_list
    guidance: 'Examine: role-based training documentation; security responsibility assignments; training
      completion records.'
  - key: b
    text: Information security-related duties, roles, and responsibilities are assigned to designated
      personnel.
    type: narrative
  - key: c
    text: Personnel are adequately trained to carry out their assigned information security- related duties,
      roles, and responsibilities.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
  discussion: Organizations determine the appropriate content of security training based on assigned roles
    and responsibilities and the specific requirements of the organization and the systems to which personnel
    have authorized access. In addition, organizations provide system users with information about organizational
    security policies, standards, and procedures and the requirements for adhering to those policies.
    Security training for personnel with significant security responsibilities must be more detailed and
    role-specific.
- id: AT.L2-3.2.3
  seq: 25
  family: AT
  title: Insider Threat Awareness
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.2.3; NIST SP 800-171A 3.2.3; CMMC AG L2 v2 AT.L2-3.2.3"
  req: Provide security awareness training on recognizing and reporting potential indicators of insider
    threat.
  objectives:
  - key: a
    text: Potential indicators associated with insider threats are identified.
    type: narrative
    guidance: 'Examine: insider threat awareness training materials; documentation of potential insider
      threat indicators.'
  - key: b
    text: Security awareness training on recognizing and reporting potential indicators of insider threat
      is provided to managers and employees.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
  discussion: An important aspect of insider threat programs is ensuring that all users are aware of the
    potential for insider threats and the consequences associated with such threats. Organizations include
    in awareness training the indicators that might suggest an insider threat situation is developing.
    Specific indicators of insider threats include unusual access of system resources, unusual login times,
    or accessing information outside of a user's normal job function.
- id: AU.L2-3.3.1
  seq: 26
  family: AU
  title: System Auditing
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.3.1; NIST SP 800-171A 3.3.1; CMMC AG L2 v2 AU.L2-3.3.1"
  req: Create and retain system audit logs and records to the extent needed to enable the monitoring,
    analysis, investigation, and reporting of unlawful or unauthorized system activity.
  objectives:
  - key: a
    text: Audit logs needed (i.e., event types to be logged) to enable the monitoring, analysis, investigation,
      and reporting of unlawful or unauthorized system activity are specified.
    type: narrative
    guidance: 'Examine: audit policy; list of event types to be logged; system configuration for audit
      logging.'
  - key: b
    text: The content of audit records needed to support monitoring, analysis, investigation, and reporting
      of unlawful or unauthorized system activity is defined.
    type: product
  - key: c
    text: Audit records are created (generated).
    type: product
  - key: d
    text: Audit records, once created, contain the defined content.
    type: narrative
  - key: e
    text: Retention requirements for audit records are defined.
    type: narrative
  - key: f
    text: Audit records are retained as defined.
    type: narrative
  discussion: An event is any observable occurrence in a system. Organizations identify audit events as
    those events which are significant and relevant to the security of systems and the environments in
    which those systems operate. Audit records can be generated at various levels of abstraction, including
    at the packet level as information traverses the network. Selecting the right level of abstraction
    is a critical aspect of an audit capability and can facilitate the identification of root causes to
    problems.
- id: AU.L2-3.3.2
  seq: 27
  family: AU
  title: User Accountability
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.3.2; NIST SP 800-171A 3.3.2; CMMC AG L2 v2 AU.L2-3.3.2"
  req: Ensure that the actions of individual system users can be uniquely traced to those users, so they
    can be held accountable for their actions.
  objectives:
  - key: a
    text: The content of the audit records needed to support the ability to uniquely trace users to their
      actions is defined.
    type: narrative
    guidance: 'Examine: audit policy; audit record content requirements; sample audit records for completeness.'
  - key: b
    text: Audit records, once created, contain the defined content.
    type: product
  discussion: Audit record content that may be necessary to support the auditing function includes timestamps,
    source and destination addresses, user/process identifiers, event descriptions, success/fail indications,
    filenames involved, and access control rules invoked. Event outcomes can include indicators of event
    success or failure and event-specific results such as the security state of the information system
    after the event occurred.
- id: AU.L2-3.3.3
  seq: 28
  family: AU
  title: Review Audit Logs
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.3; NIST SP 800-171A 3.3.3; CMMC AG L2 v2 AU.L2-3.3.3"
  req: Review and update logged events.
  objectives:
  - key: a
    text: A process for determining when to review logged events is defined.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
    guidance: 'Examine: audit review process documentation; records of logged event type reviews and updates.'
  - key: b
    text: Event types being logged are reviewed in accordance with the defined review process.
    type: narrative
  - key: c
    text: Event types being logged are updated based on the review.
    type: narrative
  discussion: Logging events includes determining which events are to be logged. Log reviews can be used
    to identify what types of events should be logged or to re-calibrate the list of logged events. Organizations
    balance the risk of potential logging gaps against the risk of overloading the log management infrastructure.
    The process for reviewing and updating logged events should be systematic and documented.
- id: AU.L2-3.3.4
  seq: 29
  family: AU
  title: Audit Failure Alerting
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.4; NIST SP 800-171A 3.3.4; CMMC AG L2 v2 AU.L2-3.3.4"
  req: Alert in the event of an audit logging process failure.
  objectives:
  - key: a
    text: Personnel or roles to be alerted in the event of an audit logging process failure are identified.
    type: narrative
    guidance: 'Examine: audit logging configuration; alert configuration for audit logging failures; incident
      records.'
  - key: b
    text: Types of audit logging process failures for which alert will be generated are defined.
    type: product
  - key: c
    text: Identified personnel or roles are alerted in the event of an audit logging process failure.
    type: narrative
  discussion: Audit logging process failures include software/hardware errors, failures in the audit capturing
    mechanisms, and audit storage capacity being reached or exceeded. This requirement applies to each
    audit log on a system including component-level logs such as application logs. Alerts from audit logging
    process failures may be generated by the system and sent to the designated personnel or roles responsible
    for audit log management.
- id: AU.L2-3.3.5
  seq: 30
  family: AU
  title: Audit Correlation and Reporting
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.3.5; NIST SP 800-171A 3.3.5; CMMC AG L2 v2 AU.L2-3.3.5"
  req: Correlate audit record review, analysis, and reporting processes for investigation and response
    to indications of unlawful, unauthorized, suspicious, or unusual activity.
  objectives:
  - key: a
    text: Audit record review, analysis, and reporting processes for investigation and response to indications
      of unlawful, unauthorized, suspicious, or unusual activity are defined.
    type: product
    guidance: 'Examine: audit review and analysis process documentation; SIEM configuration; audit correlation
      procedures.'
  - key: b
    text: Defined audit record review, analysis, and reporting processes are correlated.
    type: narrative
  discussion: Correlating audit record review, analysis, and reporting processes helps organizations identify
    suspicious activity and respond more effectively to potential indicators of compromise. The correlation
    of audit records from multiple sources enables a more complete picture of system activity. Security
    information and event management (SIEM) tools can be used to correlate audit records and generate
    alerts based on patterns.
- id: AU.L2-3.3.6
  seq: 31
  family: AU
  title: Audit Reduction and Reporting
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.6; NIST SP 800-171A 3.3.6; CMMC AG L2 v2 AU.L2-3.3.6"
  req: Provide audit record reduction and report generation to support on-demand analysis and reporting.
  objectives:
  - key: a
    text: An audit record reduction capability that supports on-demand analysis is provided.
    type: product
    guidance: 'Examine: audit reduction tool configuration; report generation capability; sample audit
      reports.'
  - key: b
    text: A report generation capability that supports on-demand reporting is provided.
    type: product
  discussion: Audit record reduction and report generation are not always automatic but may be accomplished
    through the use of audit reduction tools or report generation tools. These capabilities do not always
    reside in the same information system or from the same organizational entity that conducts auditing
    activities. The audit reduction capability does not reduce the original audit records -- it reduces
    the volume for subsequent review and reporting.
- id: AU.L2-3.3.7
  seq: 32
  family: AU
  title: Authoritative Time Source
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.7; NIST SP 800-171A 3.3.7; CMMC AG L2 v2 AU.L2-3.3.7"
  req: Provide a system capability that compares and synchronizes internal system clocks with an authoritative
    source to generate time stamps for audit records.
  objectives:
  - key: a
    text: Internal system clocks are used to generate time stamps for audit records.
    type: product
    guidance: 'Examine: NTP configuration; documentation of authoritative time source; audit record time
      stamps.'
  - key: b
    text: An authoritative source with which to compare and synchronize internal system clocks is specified.
    type: product
  - key: c
    text: Internal system clocks used to generate time stamps for audit records are compared to and synchronized
      with the specified authoritative time source.
    type: narrative
  discussion: Time stamps generated by audit-capable information systems use both time and date. Time
    is commonly expressed in Coordinated Universal Time (UTC) or local time with an offset from UTC. Granularity
    of time measurements in audit records is organization-defined. Synchronizing internal system clocks
    with an authoritative source ensures that audit records accurately reflect the sequence of events
    and support forensic investigations.
- id: AU.L2-3.3.8
  seq: 33
  family: AU
  title: Audit Protection
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.8; NIST SP 800-171A 3.3.8; CMMC AG L2 v2 AU.L2-3.3.8"
  req: Protect audit information and audit tools from unauthorized access, modification, and deletion.
  objectives:
  - key: a
    text: Audit information is protected from unauthorized access.
    type: product
    guidance: 'Examine: audit log access controls; permissions on audit logs and audit tools; audit of
      audit log access.'
  - key: b
    text: Audit information is protected from unauthorized modification.
    type: product
  - key: c
    text: Audit information is protected from unauthorized deletion.
    type: narrative
  - key: d
    text: Audit logging tools are protected from unauthorized access.
    type: narrative
  - key: e
    text: Audit logging tools are protected from unauthorized modification.
    type: narrative
  - key: f
    text: Audit logging tools are protected from unauthorized deletion.
    type: narrative
  discussion: Protecting audit information includes identifying and protecting the tools used to conduct
    audits. Audit tools include software for automatically scheduling, generating, and analyzing audit
    records. Attacks on audit tools can result in the removal of audit capability from the system. Audit
    information protected from unauthorized access and modification maintains the integrity and non-repudiation
    of audit records.
- id: AU.L2-3.3.9
  seq: 34
  family: AU
  title: Privileged Audit Management
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.3.9; NIST SP 800-171A 3.3.9; CMMC AG L2 v2 AU.L2-3.3.9"
  req: Limit management of audit logging to a subset of privileged users.
  objectives:
  - key: a
    text: A subset of privileged users granted access to manage audit logging functionality is defined.
    type: document_list
    guidance: 'Examine: access control list for audit management functions; list of privileged users with
      audit management access.'
  - key: b
    text: Management of audit logging functionality is limited to the defined subset of privileged users.
    type: product
  discussion: Individuals with privileged access to audit information can potentially circumvent the audit
    process by disabling audit functions, modifying audit records, or deleting audit records. Limiting
    management of audit logging functionality to a defined subset of privileged users reduces the risk
    of audit information being compromised or destroyed. This requirement addresses the need for segregation
    of duties in audit management.
- id: CM.L2-3.4.1
  seq: 35
  family: CM
  title: Baseline Configurations
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.1; NIST SP 800-171A 3.4.1; CMMC AG L2 v2 CM.L2-3.4.1"
  req: Establish and maintain baseline configurations and inventories of organizational systems (including
    hardware, software, firmware, and documentation) throughout the respective system development life
    cycles.
  objectives:
  - key: a
    text: A baseline configuration is established.
    type: narrative
    guidance: 'Examine: baseline configuration documentation; system inventory; records of baseline review
      and update.'
  - key: b
    text: The baseline configuration includes hardware, software, firmware, and documentation.
    type: document_list
  - key: c
    text: The baseline configuration is maintained (reviewed and updated) throughout the system development
      life cycle.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
  - key: d
    text: A system inventory is established.
    type: document_list
  - key: e
    text: The system inventory includes hardware, software, firmware, and documentation.
    type: narrative
  - key: f
    text: The inventory is maintained (reviewed and updated) throughout the system development life cycle.
    type: narrative
  discussion: Baseline configurations are documented, formally reviewed and agreed-upon specifications
    for information technology products or system components. Baseline configurations include information
    about technology products installed on workstations, servers, network components, and mobile devices;
    current version numbers and patch information; and configuration settings and parameters. Inventories
    of organizational systems support effective change management and security control application.
- id: CM.L2-3.4.2
  seq: 36
  family: CM
  title: Security Configuration Settings
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.2; NIST SP 800-171A 3.4.2; CMMC AG L2 v2 CM.L2-3.4.2"
  req: Establish and enforce security configuration settings for information technology products employed
    in organizational systems.
  objectives:
  - key: a
    text: Security configuration settings for information technology products employed in the system are
      established and included in the baseline configuration.
    type: narrative
    guidance: 'Examine: security configuration baselines; system configuration settings; configuration
      management tool outputs.'
  - key: b
    text: Security configuration settings for information technology products employed in the system are
      enforced.
    type: product
  discussion: Configuration settings are the set of parameters that can be changed in hardware, firmware,
    software, or other system components that affect the security posture of the system. Information technology
    products for which security-related configuration settings can be defined include mainframe computers,
    servers, workstations, operating systems, mobile devices, applications, and network infrastructure
    devices. Security configuration baselines reflect the most restrictive mode consistent with operational
    requirements.
- id: CM.L2-3.4.3
  seq: 37
  family: CM
  title: Unauthorized Software Control
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.4.3; NIST SP 800-171A 3.4.3; CMMC AG L2 v2 CM.L2-3.4.3"
  req: Track, review, approve, and log changes to organizational systems.
  objectives:
  - key: a
    text: Changes to the system are tracked.
    type: product
    guidance: 'Examine: change control process documentation; change log; records of change tracking and
      approval.'
  - key: b
    text: Changes to the system are reviewed.
    type: narrative
  - key: c
    text: Changes to the system are approved or disapproved.
    type: product
  - key: d
    text: Changes to the system are logged.
    type: narrative
  discussion: Organizations use change control processes to systematically propose, justify, implement,
    test, review, and dispose of changes to systems. If prior to implementing changes, individuals determine
    that the proposed changes are acceptable, then those changes are implemented only if they do not adversely
    affect the security of the system. Alternatively, a security impact analysis can be conducted prior
    to implementation.
- id: CM.L2-3.4.4
  seq: 38
  family: CM
  title: Security Impact Analysis
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.4.4; NIST SP 800-171A 3.4.4; CMMC AG L2 v2 CM.L2-3.4.4"
  req: Analyze the security impact of changes prior to implementation.
  objectives:
  - key: a
    text: The security impact of changes to the system is analyzed prior to implementation.
    type: narrative
    guidance: 'Examine: security impact analysis procedure; records of security impact analysis for recent
      changes.'
  discussion: A significant change is a change that is likely to affect the security posture of the system.
    Significant changes include installing a new operating system, installing a new software application,
    installing a new hardware component, changes in the system environment, and the expiration of a security
    authorization. Changes to any of the critical components of the system can potentially impact security
    and thus require analysis prior to implementation.
- id: CM.L2-3.4.5
  seq: 39
  family: CM
  title: Access Restrictions for Change
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.5; NIST SP 800-171A 3.4.5; CMMC AG L2 v2 CM.L2-3.4.5"
  req: Define, document, approve, and enforce physical and logical access restrictions associated with
    changes to organizational systems.
  objectives:
  - key: a
    text: Physical access restrictions associated with changes to the system are defined.
    type: narrative
    guidance: 'Examine: change control policy; access control list for change management systems; records
      of access approval.'
  - key: b
    text: Physical access restrictions associated with changes to the system are documented.
    type: narrative
  - key: c
    text: Physical access restrictions associated with changes to the system are approved.
    type: product
  - key: d
    text: Physical access restrictions associated with changes to the system are enforced.
    type: narrative
  - key: e
    text: Logical access restrictions associated with changes to the system are defined.
    type: narrative
  - key: f
    text: Logical access restrictions associated with changes to the system are documented.
    type: narrative
  - key: g
    text: Logical access restrictions associated with changes to the system are approved.
    type: narrative
  - key: h
    text: Logical access restrictions associated with changes to the system are enforced.
    type: narrative
  discussion: This requirement restricts access to change control systems, change requests, and related
    management tools. Only authorized individuals should have the ability to modify the system in ways
    that affect its security posture. Physical access restrictions address physical modifications to systems
    while logical access restrictions address software-based modifications. Both types of restrictions
    should be consistently defined, documented, approved, and enforced.
- id: CM.L2-3.4.6
  seq: 40
  family: CM
  title: Least Functionality
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.6; NIST SP 800-171A 3.4.6; CMMC AG L2 v2 CM.L2-3.4.6"
  req: Employ the principle of least functionality by configuring organizational systems to provide only
    essential capabilities.
  objectives:
  - key: a
    text: Essential system capabilities are defined based on the principle of least functionality.
    type: narrative
    guidance: 'Examine: system configuration documentation; list of essential capabilities; port and service
      scan results.'
  - key: b
    text: The system is configured to provide only the defined essential capabilities.
    type: product
  discussion: Limiting the functions, ports, protocols, and services available on systems to only those
    required to meet mission or business needs reduces the attack surface. Organizations review functions,
    ports, protocols, and services provided by systems to determine which are candidates for elimination.
    Organizations can use network scanning tools and intrusion detection systems to identify and prevent
    the use of prohibited functions, ports, protocols, and services.
- id: CM.L2-3.4.7
  seq: 41
  family: CM
  title: Nonessential Capabilities
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.7; NIST SP 800-171A 3.4.7; CMMC AG L2 v2 CM.L2-3.4.7"
  req: Restrict, disable, or prevent the use of nonessential programs, functions, ports, protocols, and
    services.
  objectives:
  - key: a
    text: Essential programs are defined.
    type: narrative
    guidance: 'Examine: authorized software list; policy prohibiting unauthorized software; software inventory
      records.'
  - key: b
    text: The use of nonessential programs is defined.
    type: product
  - key: c
    text: The use of nonessential programs is restricted, disabled, or prevented as defined.
    type: narrative
  - key: d
    text: Essential functions are defined.
    type: narrative
  - key: e
    text: The use of nonessential functions is defined.
    type: narrative
  - key: f
    text: The use of nonessential functions is restricted, disabled, or prevented as defined.
    type: narrative
  - key: g
    text: Essential ports are defined.
    type: narrative
  - key: h
    text: The use of nonessential ports is defined.
    type: narrative
  - key: i
    text: The use of nonessential ports is restricted, disabled, or prevented as defined.
    type: narrative
  - key: j
    text: Essential protocols are defined.
    type: narrative
  - key: k
    text: The use of nonessential protocols is defined.
    type: narrative
  - key: l
    text: The use of nonessential protocols is restricted, disabled, or prevented as defined.
    type: narrative
  - key: m
    text: Essential services are defined.
    type: narrative
  - key: n
    text: The use of nonessential services is defined.
    type: narrative
  - key: o
    text: The use of nonessential services is restricted, disabled, or prevented as defined.
    type: narrative
  discussion: Applications that are not authorized for use by the organization are referred to as unauthorized
    software and can be introduced by users unknowingly or without authorization. Organizations can implement
    a policy that prohibits all software not included on the organization-approved software list. This
    requirement uses identical or complementary capabilities with the malicious code protection requirement
    (3.14.2).
- id: CM.L2-3.4.8
  seq: 42
  family: CM
  title: Application Execution Policy
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.4.8; NIST SP 800-171A 3.4.8; CMMC AG L2 v2 CM.L2-3.4.8"
  req: Apply deny-by-exception (blacklisting) policy to prevent the use of unauthorized software or deny-all,
    permit-by-exception (whitelisting) policy to allow the execution of authorized software.
  objectives:
  - key: a
    text: A policy specifying whether whitelisting or blacklisting is to be implemented is specified.
    type: narrative
    guidance: 'Examine: application execution policy; whitelisting or blacklisting configuration; enforcement
      records.'
  - key: b
    text: The software allowed to execute under whitelisting or denied use under blacklisting is specified.
    type: product
  - key: c
    text: Whitelisting to allow the execution of authorized software or blacklisting to prevent the use
      of unauthorized software is implemented as specified.
    type: narrative
  discussion: Allow-listing (also called whitelisting) is generally preferred over deny-by-exception (blacklisting)
    because it enforces a more restrictive posture. Deny-by-exception uses a list of prohibited software
    applications that are not allowed to execute. Organizations apply whitelisting or blacklisting policies
    as part of the software installation and configuration process. The approach selected should be documented
    and consistently enforced.
- id: CM.L2-3.4.9
  seq: 43
  family: CM
  title: User-Installed Software
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.4.9; NIST SP 800-171A 3.4.9; CMMC AG L2 v2 CM.L2-3.4.9"
  req: Control and monitor user-installed software.
  objectives:
  - key: a
    text: A policy for controlling the installation of software by users is established.
    type: narrative
    guidance: 'Examine: user software installation policy; configuration management records; software
      installation logs.'
  - key: b
    text: Installation of software by users is controlled based on the established policy.
    type: product
  - key: c
    text: Installation of software by users is monitored.
    type: narrative
  discussion: User-installed software without appropriate controls may introduce malicious code into the
    organizational environment. Malicious software is often disguised as a legitimate product or service.
    Organizations use configuration management to restrict users from installing software not authorized
    by the organization. Organizations configure workstations and servers with a specific software baseline
    and restrict user modification of that baseline.
- id: IA.L2-3.5.1
  seq: 44
  family: IA
  title: Identify System Users
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.1; NIST SP 800-171A 3.5.1; CMMC AG L2 v2 IA.L2-3.5.1"
  req: Identify system users, processes acting on behalf of users, and devices.
  objectives:
  - key: a
    text: System users are identified.
    type: document_list
    guidance: 'Examine: user account list; device inventory; documentation of system user identification.'
  - key: b
    text: Processes acting on behalf of users are identified.
    type: narrative
  - key: c
    text: Devices accessing the system are identified.
    type: document_list
  discussion: The identification of individuals, devices, and processes is a foundational security requirement.
    The use of unique identifiers allows organizations to track actions to specific individuals, processes,
    or devices. Identification and authentication of non-organizational users may require special attention.
    System identifiers include user IDs, device IDs, and process IDs used within the system.
- id: IA.L2-3.5.2
  seq: 45
  family: IA
  title: Authenticate System Users
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.2; NIST SP 800-171A 3.5.2; CMMC AG L2 v2 IA.L2-3.5.2"
  req: Authenticate (or verify) the identities of users, processes, or devices, as a prerequisite to allowing
    access to organizational systems.
  objectives:
  - key: a
    text: The identity of each user is authenticated or verified as a prerequisite to system access.
    type: product
    guidance: 'Examine: authentication policy; authentication mechanism configuration; account management
      records.'
  - key: b
    text: The identity of each process acting on behalf of a user is authenticated or verified as a prerequisite
      to system access.
    type: product
  - key: c
    text: The identity of each device accessing or connecting to the system is authenticated or verified
      as a prerequisite to system access.
    type: narrative
  discussion: Authentication of users and devices can be accomplished through the use of biometrics, passwords,
    tokens, and certificates -- alone or in combination -- to provide acceptable levels of identification
    assurance. Authenticators are employed to provide evidence that a user is who they claim to be. Authentication
    is a prerequisite to access control enforcement and must be applied consistently across all system
    access paths.
- id: IA.L2-3.5.3
  seq: 46
  family: IA
  title: Multifactor Authentication
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.5.3; NIST SP 800-171A 3.5.3; CMMC AG L2 v2 IA.L2-3.5.3"
  req: Use multifactor authentication for local and network access to privileged accounts and for network
    access to non-privileged accounts.
  objectives:
  - key: a
    text: Privileged accounts are identified.
    type: product
    guidance: 'Examine: MFA policy; list of privileged accounts; MFA configuration for local and network
      access.'
  - key: b
    text: Multifactor authentication is implemented for local access to privileged accounts.
    type: product
  - key: c
    text: Multifactor authentication is implemented for network access to privileged accounts.
    type: product
  - key: d
    text: Multifactor authentication is implemented for network access to non-privileged accounts.
    type: narrative
  discussion: 'Multi-factor authentication (MFA) requires the use of two or more different factors to
    achieve authentication. The factors are: something you know (e.g., a PIN), something you have (e.g.,
    a cryptographic private key or hardware token), or something you are (e.g., a biometric). Multi-factor
    solutions that feature physical authenticators include hardware authenticators that provide time-based
    or challenge-response codes, and smart cards such as the U.S. Government Personal Identity Verification
    card.'
- id: IA.L2-3.5.4
  seq: 47
  family: IA
  title: Replay-Resistant Authentication
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.4; NIST SP 800-171A 3.5.4; CMMC AG L2 v2 IA.L2-3.5.4"
  req: Employ replay-resistant authentication mechanisms for network access to privileged and non-privileged
    accounts.
  objectives:
  - key: a
    text: Replay-resistant authentication mechanisms are implemented for network account access to privileged
      and non-privileged accounts.
    type: product
    guidance: 'Examine: authentication mechanism configuration; documentation of replay-resistant authentication
      methods.'
  discussion: Authentication feedback such as showing asterisks when a password is typed provides information
    that may be exploited by adversaries to compromise authentication mechanisms. The feedback from authentication
    systems does not provide information that would allow unauthorized individuals to compromise authentication.
    Replay-resistant authentication mechanisms prevent attacks that replay previously captured authentication
    messages.
- id: IA.L2-3.5.5
  seq: 48
  family: IA
  title: Identifier Reuse
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.5; NIST SP 800-171A 3.5.5; CMMC AG L2 v2 IA.L2-3.5.5"
  req: Employ identifier management practices that include not reusing identifiers for a defined period.
  objectives:
  - key: a
    text: A period within which identifiers cannot be reused is defined.
    type: narrative
    guidance: 'Examine: identifier management policy; documentation of reuse prohibition period; account
      management records.'
  - key: b
    text: Reuse of identifiers is prevented within the defined period.
    type: product
  discussion: Identifier management involves establishing, maintaining, and terminating identifiers used
    to authenticate users, devices, and processes. Establishing policies that prevent the reuse of identifiers
    for a defined period helps protect against replay attacks and ensures that audit records can be uniquely
    attributed to individual entities over time.
- id: IA.L2-3.5.6
  seq: 49
  family: IA
  title: Identifier Handling
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.6; NIST SP 800-171A 3.5.6; CMMC AG L2 v2 IA.L2-3.5.6"
  req: Disable identifiers after a defined inactivity period.
  objectives:
  - key: a
    text: A period of inactivity after which an identifier is disabled is defined.
    type: narrative
    guidance: 'Examine: identifier management policy; documentation of inactivity period; records of disabled
      accounts.'
  - key: b
    text: Identifiers are disabled after the defined period of inactivity.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
  discussion: Identifiers that are no longer active due to inactivity can be exploited by adversaries
    who have obtained the credentials associated with those identifiers. Disabling identifiers after a
    defined period of inactivity reduces the risk that dormant accounts are compromised. Organizations
    should define the period of inactivity based on mission requirements and security risk assessments.
- id: IA.L2-3.5.7
  seq: 50
  family: IA
  title: Password Complexity
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.7; NIST SP 800-171A 3.5.7; CMMC AG L2 v2 IA.L2-3.5.7"
  req: Enforce a minimum password complexity and change requirements for passwords used as authenticators.
  objectives:
  - key: a
    text: Password complexity requirements are defined.
    type: narrative
    guidance: 'Examine: password policy; documentation of complexity requirements; system configuration
      for password enforcement.'
  - key: b
    text: Password change of character requirements are defined.
    type: product
  - key: c
    text: Minimum password complexity requirements as defined are enforced when new passwords are created.
    type: narrative
  - key: d
    text: Minimum password change of character requirements as defined are enforced when new passwords
      are created.
    type: product
  discussion: Password complexity and length are important factors in determining password strength. Organizations
    may specify different password minimum complexity and length requirements for different system components
    based on the sensitivity of data and the security risks associated with each component. Organizations
    may also establish specific requirements for particular account types such as administrative accounts.
- id: IA.L2-3.5.8
  seq: 51
  family: IA
  title: Password Reuse
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.8; NIST SP 800-171A 3.5.8; CMMC AG L2 v2 IA.L2-3.5.8"
  req: Prohibit password reuse for a specified number of generations.
  objectives:
  - key: a
    text: The number of generations during which a password cannot be reused is specified and [b] reuse
      of passwords is prohibited during the specified number of generations.
    type: narrative
    guidance: 'Examine: password policy; documentation of reuse prohibition generations; password history
      configuration.'
  discussion: Password reuse prevention helps protect against replay attacks and ensures that users do
    not cycle through a set of passwords to return to a previously used one. Organization-defined parameters
    for this requirement include the number of generations to restrict and any historical time period
    limitations. This requirement applies to single-factor authentication of individuals using passwords
    and to passwords used in multi-factor authenticators.
- id: IA.L2-3.5.9
  seq: 52
  family: IA
  title: Temporary Passwords
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.9; NIST SP 800-171A 3.5.9; CMMC AG L2 v2 IA.L2-3.5.9"
  req: Allow temporary password use for system logons with an immediate change to a permanent password.
  objectives:
  - key: a
    text: An immediate change to a permanent password is required when a temporary password is used for
      system logon.
    type: product
    guidance: 'Examine: account management policy; system configuration requiring password change at first
      logon.'
  discussion: Temporary passwords are often issued when accounts are first created or when users need
    to reset their credentials. Requiring an immediate change to a permanent password when a temporary
    password is used prevents the temporary credential from being exploited. Temporary passwords must
    meet the same complexity and length requirements as permanent passwords.
- id: IA.L2-3.5.10
  seq: 53
  family: IA
  title: Cryptographically Protected Passwords
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.5.10; NIST SP 800-171A 3.5.10; CMMC AG L2 v2 IA.L2-3.5.10"
  req: Store and transmit only cryptographically-protected passwords.
  objectives:
  - key: a
    text: Passwords are cryptographically protected in storage.
    type: product
    guidance: 'Examine: password storage configuration; transmission protection configuration; use of
      FIPS-validated cryptography.'
  - key: b
    text: Passwords are cryptographically protected in transit.
    type: product
  discussion: Cryptographic protection of passwords prevents disclosure of password information during
    storage and transmission. Cryptographic mechanisms include hashing algorithms (for storage) and transport
    layer security (for transmission). Organizations should use FIPS-validated cryptographic modules for
    protecting passwords. This requirement applies to both the storage of password hashes and the transmission
    of passwords during authentication.
- id: IA.L2-3.5.11
  seq: 54
  family: IA
  title: Obscure Authentication Feedback
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.5.11; NIST SP 800-171A 3.5.11; CMMC AG L2 v2 IA.L2-3.5.11"
  req: Obscure feedback of authentication information.
  objectives:
  - key: a
    text: Authentication information is obscured during the authentication process.
    type: product
    guidance: 'Examine: authentication interface configuration; system settings for obscuring authentication
      feedback.'
  discussion: Obscuring authentication feedback such as password fields protects potentially sensitive
    information from being observed by unauthorized individuals who may be in the vicinity. This applies
    not only to direct observation but also to automated or shoulder-surfing attacks. Authentication systems
    should not display clear-text passwords or provide feedback that reveals the length or content of
    the password.
- id: IR.L2-3.6.1
  seq: 55
  family: IR
  title: Incident Handling
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.6.1; NIST SP 800-171A 3.6.1; CMMC AG L2 v2 IR.L2-3.6.1"
  req: Establish an operational incident-handling capability for organizational systems that includes
    preparation, detection, analysis, containment, recovery, and user response activities.
  objectives:
  - key: a
    text: An operational incident-handling capability is established.
    type: narrative
    guidance: 'Examine: incident response plan; incident handling capability documentation; incident response
      procedures.'
  - key: b
    text: The operational incident-handling capability includes preparation.
    type: narrative
  - key: c
    text: The operational incident-handling capability includes detection.
    type: product
  - key: d
    text: The operational incident-handling capability includes analysis.
    type: narrative
  - key: e
    text: The operational incident-handling capability includes containment.
    type: narrative
  - key: f
    text: The operational incident-handling capability includes recovery.
    type: narrative
  - key: g
    text: The operational incident-handling capability includes user response activities.
    type: narrative
  discussion: Organizations recognize that incident response capabilities are dependent on the capabilities
    of organizational systems and the mission/business processes being supported. Organizations consider
    incident response as part of the definition, design, and development of mission/business processes
    and systems. Incident-related information can be obtained from audit monitoring, network monitoring,
    physical access monitoring, user and administrator reports, and reported supply chain events.
- id: IR.L2-3.6.2
  seq: 56
  family: IR
  title: Incident Reporting
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.6.2; NIST SP 800-171A 3.6.2; CMMC AG L2 v2 IR.L2-3.6.2"
  req: Track, document, and report incidents to designated officials and/or authorities both internal
    and external to the organization.
  objectives:
  - key: a
    text: Incidents are tracked.
    type: narrative
    guidance: 'Examine: incident tracking records; incident documentation; reporting procedures and records.'
  - key: b
    text: Incidents are documented.
    type: narrative
  - key: c
    text: Authorities to whom incidents are to be reported are identified.
    type: narrative
  - key: d
    text: Organizational officials to whom incidents are to be reported are identified.
    type: narrative
  - key: e
    text: Identified authorities are notified of incidents.
    type: narrative
  - key: f
    text: Identified organizational officials are notified of incidents.
    type: narrative
  discussion: Tracking and documenting system security incidents includes maintaining records about each
    incident, the status of the incident, and other pertinent information necessary to facilitate incident
    recovery and lessons learned. Tracking system security incidents also includes communicating relevant
    information to appropriate authorities. The type and scope of information shared depends on the nature
    of the incident.
- id: IR.L2-3.6.3
  seq: 57
  family: IR
  title: Incident Response Testing
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.6.3; NIST SP 800-171A 3.6.3; CMMC AG L2 v2 IR.L2-3.6.3"
  req: Test the organizational incident response capability.
  objectives:
  - key: a
    text: The incident response capability is tested.
    type: scheduled_operation
    cadence: annual
    cadence_resp: shared
    guidance: 'Examine: incident response test plan; records of incident response capability testing;
      after-action reports.'
  discussion: Incidents that are in progress or have occurred are examined to determine the cause and
    identify vulnerabilities that were exploited. An important aspect of organizational computer security
    incident response is the development of remediation actions for identified vulnerabilities. Lessons
    learned can result in changes to policies, procedures, and controls. Testing should use exercises
    based on real-world scenarios.
- id: MA.L2-3.7.1
  seq: 58
  family: MA
  title: Perform Maintenance
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.7.1; NIST SP 800-171A 3.7.1; CMMC AG L2 v2 MA.L2-3.7.1"
  req: Perform maintenance on organizational systems.
  objectives:
  - key: a
    text: System maintenance is performed.
    type: scheduled_operation
    cadence: annual
    cadence_resp: msp
    guidance: 'Examine: maintenance policy; maintenance records; schedules and completion records for
      system maintenance.'
  discussion: This requirement addresses the management of maintenance for organizational systems including
    hardware and software. Maintenance also includes those repairs that are necessitated by failures or
    malfunctions and improvements that address security vulnerabilities. Organizations perform maintenance
    in a timely manner and in accordance with organizational policies, procedures, and requirements.
- id: MA.L2-3.7.2
  seq: 59
  family: MA
  title: System Maintenance Control
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.7.2; NIST SP 800-171A 3.7.2; CMMC AG L2 v2 MA.L2-3.7.2"
  req: Provide controls on the tools, techniques, mechanisms, and personnel used to conduct system maintenance.
  objectives:
  - key: a
    text: Tools used to conduct system maintenance are controlled.
    type: narrative
    guidance: 'Examine: maintenance policy; maintenance tool inventory; controls on maintenance tools
      and techniques.'
  - key: b
    text: Techniques used to conduct system maintenance are controlled.
    type: document_list
  - key: c
    text: Mechanisms used to conduct system maintenance are controlled.
    type: narrative
  - key: d
    text: Personnel used to conduct system maintenance are controlled.
    type: narrative
  discussion: Individuals not previously identified as authorized for maintenance may need access to organizational
    systems to perform maintenance activities. This requirement addresses situations where maintenance
    personnel do not have appropriate access authorization. Organizations may need to escort maintenance
    personnel into areas of restricted access to perform maintenance activities, and may need to sanitize
    systems before allowing maintenance personnel access.
- id: MA.L2-3.7.3
  seq: 60
  family: MA
  title: Equipment Sanitation
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.7.3; NIST SP 800-171A 3.7.3; CMMC AG L2 v2 MA.L2-3.7.3"
  req: Ensure equipment removed for off-site maintenance is sanitized.
  objectives:
  - key: a
    text: Equipment to be removed from organizational spaces for off-site maintenance is sanitized of
      any CUI.
    type: narrative
    guidance: 'Examine: maintenance policy; records of equipment sanitization prior to off-site maintenance.'
  discussion: This requirement addresses the security risk associated with maintenance activities undertaken
    from remote locations. Malicious code can be introduced into a system as a result of unauthorized
    or poorly controlled remote maintenance activities. The use of cryptographic mechanisms to protect
    communications channels for remote maintenance reduces the risk of data interception and unauthorized
    modification during maintenance.
- id: MA.L2-3.7.4
  seq: 61
  family: MA
  title: Non-Local Maintenance
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.7.4; NIST SP 800-171A 3.7.4; CMMC AG L2 v2 MA.L2-3.7.4"
  req: Check media containing diagnostic and test programs for malicious code before the media are used
    in organizational systems.
  objectives:
  - key: a
    text: Media containing diagnostic and test programs are checked for malicious code before being used
      in organizational systems that process, store, or transmit CUI.
    type: product
    guidance: 'Examine: maintenance policy; records of media scanning prior to use in systems; anti-malware
      scan results.'
  discussion: Maintenance tools can be a potential source of vulnerabilities for the organization. A maintenance
    tool could be used to introduce malicious code, or could itself be vulnerable, thereby providing a
    mechanism for exploitation. Organizations check media used for diagnostic and test programs before
    use in organizational systems that process, store, or transmit CUI to ensure the media is free of
    malicious code.
- id: MA.L2-3.7.5
  seq: 62
  family: MA
  title: Two-Factor Maintenance Auth
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.7.5; NIST SP 800-171A 3.7.5; CMMC AG L2 v2 MA.L2-3.7.5"
  req: Require MFA to establish nonlocal maintenance sessions via external networks and terminate such
    connections when nonlocal maintenance is complete.
  objectives:
  - key: a
    text: Multifactor authentication is used to establish nonlocal maintenance sessions via external network
      connections.
    type: product
    guidance: 'Examine: remote maintenance policy; MFA configuration for nonlocal maintenance; session
      termination records.'
  - key: b
    text: Nonlocal maintenance sessions established via external network connections are terminated when
      nonlocal maintenance is complete.
    type: product
  discussion: Remote maintenance tools are those used in conjunction with remote maintenance of systems.
    The use of remote maintenance tools creates opportunities for adversaries to conduct unauthorized
    maintenance activities. Requiring multi-factor authentication for nonlocal maintenance sessions and
    terminating sessions when maintenance is complete reduces the risk of unauthorized access through
    maintenance channels.
- id: MA.L2-3.7.6
  seq: 63
  family: MA
  title: Maintenance Personnel
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.7.6; NIST SP 800-171A 3.7.6; CMMC AG L2 v2 MA.L2-3.7.6"
  req: Supervise the maintenance activities of personnel without required access authorization.
  objectives:
  - key: a
    text: Maintenance personnel without required access authorization are supervised during maintenance
      activities.
    type: document_list
    guidance: 'Examine: maintenance personnel authorization records; escort logs; supervision records
      for maintenance activities.'
  discussion: Maintenance personnel are important to the security of systems. Some maintenance activities
    require access to system functions or information that maintenance personnel are not otherwise authorized
    to access. Supervising maintenance activities of personnel without required access authorization ensures
    that system security is maintained throughout the maintenance process and that sensitive information
    is protected.
- id: MP.L2-3.8.1
  seq: 64
  family: MP
  title: Media Protection
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.8.1; NIST SP 800-171A 3.8.1; CMMC AG L2 v2 MP.L2-3.8.1"
  req: Protect (i.e., physically control and securely store) system media containing CUI, both paper and
    digital.
  objectives:
  - key: a
    text: Paper media containing CUI is physically controlled.
    type: narrative
    guidance: 'Examine: media protection policy; physical security controls for paper media; storage location
      security.'
  - key: b
    text: Digital media containing CUI is physically controlled.
    type: narrative
  - key: c
    text: Paper media containing CUI is securely stored.
    type: narrative
  - key: d
    text: Digital media containing CUI is securely stored.
    type: narrative
  discussion: System media includes digital media such as diskettes, magnetic tapes, external and removable
    hard drives, flash drives, compact disks, and DVDs, as well as non-digital media such as paper and
    microfilm. Physical controls and secure storage protect CUI from unauthorized access. Organizations
    protect digital media in a manner consistent with the classification or sensitivity of the information
    prior to removal from controlled areas.
- id: MP.L2-3.8.2
  seq: 65
  family: MP
  title: Media Access
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.8.2; NIST SP 800-171A 3.8.2; CMMC AG L2 v2 MP.L2-3.8.2"
  req: Limit access to CUI on system media to authorized users.
  objectives:
  - key: a
    text: Access to CUI on system media is limited to authorized users.
    type: document_list
    guidance: 'Examine: media access policy; access control list for media containing CUI; media checkout
      records.'
  discussion: Digital and non-digital media require physical protection to prevent unauthorized access
    to CUI. Access controls on media limit who can access information stored on that media. Organizations
    establish policies and procedures that define who is authorized to access system media containing
    CUI and the conditions under which access is granted. Access restrictions apply to both local and
    remote access to media.
- id: MP.L2-3.8.3
  seq: 66
  family: MP
  title: Media Sanitization
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.8.3; NIST SP 800-171A 3.8.3; CMMC AG L2 v2 MP.L2-3.8.3"
  req: Sanitize or destroy system media before disposal or reuse.
  objectives:
  - key: a
    text: System media containing CUI is sanitized or destroyed before disposal.
    type: narrative
    guidance: 'Examine: media sanitization policy; media sanitization records; evidence of sanitization
      methods used.'
  - key: b
    text: System media containing CUI is sanitized before it is released for reuse.
    type: narrative
  discussion: Organizations have a duty to protect sensitive information from inadvertent disclosure when
    media is sanitized for release or disposal. Sanitization techniques include overwriting, degaussing,
    encrypting and then destroying the encryption key, and physical destruction. The organization ensures
    that CUI is not accessible on sanitized media by performing sanitization based on the type of media
    and the sensitivity of the information.
- id: MP.L2-3.8.4
  seq: 67
  family: MP
  title: Media Marking
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.8.4; NIST SP 800-171A 3.8.4; CMMC AG L2 v2 MP.L2-3.8.4"
  req: Mark media with necessary CUI markings and distribution limitations.
  objectives:
  - key: a
    text: Media containing CUI is marked with applicable CUI markings.
    type: narrative
    guidance: 'Examine: media marking policy; sample marked media; consistency of markings with CUI requirements.'
  - key: b
    text: Media containing CUI is marked with distribution limitations.
    type: narrative
  discussion: Marking of media includes the marking of media with applicable CUI markings and associated
    security markings in accordance with applicable laws, Executive Orders, directives, regulations, or
    standards. Markings provide notice to users of the sensitivity of the information contained on the
    media and the restrictions on its use and distribution. Media markings should be consistent with the
    markings on the information itself.
- id: MP.L2-3.8.5
  seq: 68
  family: MP
  title: Media Accountability
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.8.5; NIST SP 800-171A 3.8.5; CMMC AG L2 v2 MP.L2-3.8.5"
  req: Control access to media containing CUI and maintain accountability for media during transport outside
    of controlled areas.
  objectives:
  - key: a
    text: Access to media containing CUI is controlled.
    type: product
    guidance: 'Examine: media transport policy; media accountability records; chain of custody documentation.'
  - key: b
    text: Accountability for media containing CUI is maintained during transport outside of controlled
      areas.
    type: narrative
  discussion: This requirement applies to the transportation and storage of media containing CUI. Accountability
    for media during transport outside of controlled areas involves knowing where the media is located
    at all times, who has possession of the media, and ensuring that the media arrives safely at its destination.
    Physical controls such as sealed containers and custody chains help maintain accountability.
- id: MP.L2-3.8.6
  seq: 69
  family: MP
  title: Media Encryption in Transit
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.8.6; NIST SP 800-171A 3.8.6; CMMC AG L2 v2 MP.L2-3.8.6"
  req: Implement cryptographic mechanisms to protect the confidentiality of CUI during transport unless
    otherwise protected by alternative physical safeguards.
  objectives:
  - key: a
    text: The confidentiality of CUI stored on digital media is protected during transport using cryptographic
      mechanisms or alternative physical safeguards.
    type: product
    guidance: 'Examine: media encryption configuration; transport encryption policy; evidence of FIPS-validated
      cryptography.'
  discussion: Cryptographic mechanisms provide strong protection for CUI on portable digital media to
    protect against unauthorized disclosure if the media is lost or stolen during transport. FIPS-validated
    cryptographic mechanisms should be used when implementing this requirement. Alternative physical safeguards
    such as locked containers or courier services may substitute for cryptographic mechanisms in some
    circumstances.
- id: MP.L2-3.8.7
  seq: 70
  family: MP
  title: Removable Media
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.8.7; NIST SP 800-171A 3.8.7; CMMC AG L2 v2 MP.L2-3.8.7"
  req: Control the use of removable media on system components.
  objectives:
  - key: a
    text: The use of removable media on system components is controlled.
    type: product
    guidance: 'Examine: removable media policy; endpoint management configuration; records of removable
      media use.'
  discussion: Removable media can be used to transfer CUI from one place to another and can introduce
    malicious code into systems. Organizations control the use of removable media to reduce the risk of
    loss, theft, and the introduction of malicious code. Controls on removable media include restrictions
    on the types of media allowed, requirements for encryption, and logging of media use.
- id: MP.L2-3.8.8
  seq: 71
  family: MP
  title: Prohibit Unidentified Portable Storage
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.8.8; NIST SP 800-171A 3.8.8; CMMC AG L2 v2 MP.L2-3.8.8"
  req: Prohibit the use of portable storage devices when such devices have no identifiable owner.
  objectives:
  - key: a
    text: The use of portable storage devices is prohibited when such devices have no identifiable owner.
    type: product
    guidance: 'Examine: portable storage device policy; endpoint management configuration blocking unidentified
      devices.'
  discussion: Portable storage devices without identifiable owners pose a security risk because they may
    contain malicious code or be used to exfiltrate information. The prohibition on use of portable storage
    devices without identifiable owners reduces the risk of introducing malicious code through unknown
    media. Organizations implement technical controls such as endpoint management solutions to enforce
    this prohibition.
- id: MP.L2-3.8.9
  seq: 72
  family: MP
  title: Backup CUI Confidentiality
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.8.9; NIST SP 800-171A 3.8.9; CMMC AG L2 v2 MP.L2-3.8.9"
  req: Protect the confidentiality of backup CUI at storage locations.
  objectives:
  - key: a
    text: The confidentiality of backup CUI is protected at storage locations.
    type: document_list
    guidance: 'Examine: backup policy; backup storage location security controls; encryption of backup
      CUI.'
  discussion: Backup copies of CUI are vulnerable to unauthorized disclosure if not properly protected.
    Organizations protect backup CUI to the same extent as the original CUI. Protecting the confidentiality
    of backup CUI at storage locations includes using encryption, access controls, and physical security
    measures. Backup media containing CUI should be stored in a secure location separate from operational
    systems.
- id: PS.L2-3.9.1
  seq: 73
  family: PS
  title: Screen Personnel
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.9.1; NIST SP 800-171A 3.9.1; CMMC AG L2 v2 PS.L2-3.9.1"
  req: Screen individuals prior to authorizing access to organizational systems containing CUI.
  objectives:
  - key: a
    text: Individuals are screened prior to authorizing access to organizational systems containing CUI.
    type: narrative
    guidance: 'Examine: personnel screening policy; personnel screening records; access authorization
      process.'
  discussion: Personnel security involves establishing requirements for the screening and vetting of personnel
    who occupy positions with access to sensitive organizational information. Personnel security requirements
    may apply to all personnel who need access to systems and information, or only to those individuals
    who hold specific positions, have a specific work-related need to know, or are otherwise considered
    at-risk for security incidents.
- id: PS.L2-3.9.2
  seq: 74
  family: PS
  title: CUI Protection After Termination
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.9.2; NIST SP 800-171A 3.9.2; CMMC AG L2 v2 PS.L2-3.9.2"
  req: Ensure that CUI is protected during and after personnel actions such as terminations and transfers.
  objectives:
  - key: a
    text: A policy and/or process for terminating system access and any credentials coincident with personnel
      actions is established.
    type: narrative
    guidance: 'Examine: personnel termination/transfer policy; records of access termination; credential
      revocation records.'
  - key: b
    text: System access and credentials are terminated consistent with personnel actions such as termination
      or transfer.
    type: narrative
  - key: c
    text: The system is protected during and after personnel transfer actions.
    type: narrative
  discussion: This requirement ensures that organizations manage the risks associated with termination
    and transfer actions through the prompt termination of system access and removal of security credentials
    for personnel who no longer need access to organizational systems or information. Organizations define
    the period of time for access termination consistent with personnel security policies and the sensitivity
    of information.
- id: PE.L2-3.10.1
  seq: 75
  family: PE
  title: Limit Physical Access
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.10.1; NIST SP 800-171A 3.10.1; CMMC AG L2 v2 PE.L2-3.10.1"
  req: Limit physical access to organizational systems to authorized individuals, processes, and equipment.
  objectives:
  - key: a
    text: Authorized individuals allowed physical access are identified.
    type: document_list
    guidance: 'Examine: physical access control policy; list of authorized individuals; physical access
      control mechanism.'
  - key: b
    text: Physical access to organizational systems is limited to authorized individuals.
    type: narrative
  - key: c
    text: Physical access to equipment is limited to authorized individuals.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
  - key: d
    text: Physical access to operating environments is limited to authorized individuals.
    type: narrative
  discussion: Physical access controls apply to employees and visitors alike. Organizations control access
    to facilities, equipment, and other physical resources. The implementation of physical access controls
    may require the use of personal identification verification, smart cards, key cards, and security
    guards. Physical access controls should be commensurate with the value and sensitivity of the assets
    being protected.
- id: PE.L2-3.10.2
  seq: 76
  family: PE
  title: Monitor Physical Facility
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.10.2; NIST SP 800-171A 3.10.2; CMMC AG L2 v2 PE.L2-3.10.2"
  req: Protect and monitor the physical facility and support infrastructure for organizational systems.
  objectives:
  - key: a
    text: The physical facility where organizational systems reside is protected.
    type: narrative
    guidance: 'Examine: facility protection documentation; physical security controls; monitoring system
      configuration.'
  - key: b
    text: The support infrastructure for organizational systems is protected.
    type: product
  - key: c
    text: The physical facility where organizational systems reside is monitored.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
  - key: d
    text: The support infrastructure for organizational systems is monitored.
    type: narrative
  discussion: Organizations are required to protect systems and related infrastructure that house CUI.
    Physical access control includes controls such as guards, security cameras, locks, biometrics, and
    access control lists. Monitoring of physical facilities includes review of access logs, video surveillance
    records, and results of physical inspections. Support infrastructure includes power distribution,
    environmental controls, and communications.
- id: PE.L2-3.10.3
  seq: 77
  family: PE
  title: Escort Visitors
  weight: 1
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.10.3; NIST SP 800-171A 3.10.3; CMMC AG L2 v2 PE.L2-3.10.3"
  req: Escort visitors and monitor visitor activity.
  objectives:
  - key: a
    text: Visitors are escorted.
    type: document_list
    guidance: 'Examine: visitor access policy; visitor log; evidence of visitor escort procedures.'
  - key: b
    text: Visitor activity is monitored.
    type: narrative
  discussion: Visitor access records include the visitor's organization, purpose of visit, and dates of
    access. The visitor access records are reviewed as part of any insider threat activities or in response
    to a security incident. Escorting visitors protects sensitive areas and information from unauthorized
    access by people who have not been vetted to the same extent as organizational personnel.
- id: PE.L2-3.10.4
  seq: 78
  family: PE
  title: Physical Access Audit Logs
  weight: 1
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.10.4; NIST SP 800-171A 3.10.4; CMMC AG L2 v2 PE.L2-3.10.4"
  req: Maintain audit logs of physical access.
  objectives:
  - key: a
    text: Audit logs of physical access are maintained.
    type: product
    guidance: 'Examine: physical access audit log; log retention policy; review records for physical access
      logs.'
  discussion: Audit logging and monitoring of physical access is important because physical security events
    such as unauthorized access and theft can have significant impacts on organizational operations and
    CUI. Audit logs of physical access include records of who entered and exited controlled areas, what
    access devices were used, and when access occurred. Physical access logs support investigation of
    security incidents.
- id: PE.L2-3.10.5
  seq: 79
  family: PE
  title: Physical Access Device Control
  weight: 1
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.10.5; NIST SP 800-171A 3.10.5; CMMC AG L2 v2 PE.L2-3.10.5"
  req: Control and manage physical access devices.
  objectives:
  - key: a
    text: Physical access devices are identified.
    type: document_list
    guidance: 'Examine: physical access device inventory; access device issuance and revocation records.'
  - key: b
    text: Physical access devices are controlled.
    type: product
  - key: c
    text: Physical access devices are managed.
    type: narrative
  discussion: Access devices such as badges, keys, and combination codes that allow access to facilities
    require management and control to protect the security of the facilities. Controlling and managing
    physical access devices includes inventorying devices, issuing and revoking access, and regularly
    auditing who has access to what areas. Lost or stolen access devices should be reported and revoked
    promptly.
- id: PE.L2-3.10.6
  seq: 80
  family: PE
  title: Alternate Work Sites
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.10.6; NIST SP 800-171A 3.10.6; CMMC AG L2 v2 PE.L2-3.10.6"
  req: Enforce safeguarding measures for CUI at alternate work sites.
  objectives:
  - key: a
    text: Safeguarding measures for CUI are defined for alternate work sites.
    type: document_list
    guidance: 'Examine: alternate work site policy; documentation of safeguarding measures for CUI at
      alternate work sites.'
  - key: b
    text: Safeguarding measures for CUI are enforced for alternate work sites.
    type: narrative
  discussion: Personnel working in alternate work sites such as home offices present unique security challenges
    since the normal physical access controls used in organizational facilities may not be available.
    The security controls necessary to protect information processed, stored, or transmitted at alternative
    work sites are determined by the organization based on risk. Organizations may limit the types of
    CUI that can be processed at alternative work sites.
- id: RA.L2-3.11.1
  seq: 81
  family: RA
  title: Risk Assessment
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.11.1; NIST SP 800-171A 3.11.1; CMMC AG L2 v2 RA.L2-3.11.1"
  req: Periodically assess the risk to organizational operations (including mission, functions, image,
    or reputation), organizational assets, and individuals, resulting from the operation of organizational
    systems and the associated processing, storage, or transmission of CUI.
  objectives:
  - key: b
    text: Risk to organizational operations, organizational assets, and individuals resulting from the
      operation of an organizational system that processes, stores, or transmits CUI is assessed with
      the defined frequency.
    type: scheduled_operation
    cadence: annual
    cadence_resp: shared
    guidance: 'Examine: risk assessment policy; risk assessment reports; documentation of risk assessment
      frequency.'
  discussion: Risk assessments consider threats, vulnerabilities, likelihood, and impact to organizational
    operations and assets, individuals, and other organizations. Risk assessments also consider risk from
    external parties such as service providers, contractors, and others who access organizational systems
    or data. Organizations conduct risk assessments at all three tiers of the risk management hierarchy
    and at any phase in the system development life cycle.
- id: RA.L2-3.11.2
  seq: 82
  family: RA
  title: Vulnerability Scanning
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.11.2; NIST SP 800-171A 3.11.2; CMMC AG L2 v2 RA.L2-3.11.2"
  req: Scan for vulnerabilities in organizational systems and applications periodically and when new vulnerabilities
    affecting those systems and applications are identified.
  objectives:
  - key: a
    text: The frequency to scan for vulnerabilities in organizational systems and applications is defined.
    type: narrative
    guidance: 'Examine: vulnerability scanning policy; documentation of scan frequency; vulnerability
      scan reports.'
  - key: b
    text: Vulnerability scans are performed on organizational systems with the defined frequency.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
  - key: c
    text: Vulnerability scans are performed on applications with the defined frequency.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
  - key: d
    text: Vulnerability scans are performed on organizational systems when new vulnerabilities are identified.
    type: narrative
  - key: e
    text: Vulnerability scans are performed on applications when new vulnerabilities are identified.
    type: narrative
  discussion: Vulnerability scanning includes scanning for patch levels, scanning for functions and services
    that should not be accessible, and scanning for improperly configured information flow control mechanisms.
    Organizations define the frequency of vulnerability scans. Vulnerability analyses for custom software
    applications may require additional approaches such as static analysis, dynamic analysis, or binary
    analysis.
- id: RA.L2-3.11.3
  seq: 83
  family: RA
  title: Vulnerability Remediation
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.11.3; NIST SP 800-171A 3.11.3; CMMC AG L2 v2 RA.L2-3.11.3"
  req: Remediate vulnerabilities in accordance with risk assessments.
  objectives:
  - key: a
    text: Vulnerabilities are identified.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
    guidance: 'Examine: vulnerability management policy; vulnerability scan results; remediation records
      and timelines.'
  - key: b
    text: Vulnerabilities are remediated in accordance with risk assessments.
    type: narrative
  discussion: Organizations analyze vulnerability scan reports and results from assessments to identify
    vulnerabilities in organizational systems. Through the review of vulnerability scan reports, organizations
    identify the risk and potential impact of identified vulnerabilities and prioritize them for remediation.
    The risk assessment informs the prioritization and timeline for vulnerability remediation.
- id: CA.L2-3.12.1
  seq: 84
  family: CA
  title: Security Control Assessment
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.12.1; NIST SP 800-171A 3.12.1; CMMC AG L2 v2 CA.L2-3.12.1"
  req: Periodically assess the security controls in organizational systems to determine if the controls
    are effective in their application.
  objectives:
  - key: a
    text: The frequency of security control assessments is defined.
    type: scheduled_operation
    cadence: annual
    cadence_resp: shared
    guidance: 'Examine: security assessment policy; documentation of assessment frequency; security assessment
      reports.'
  - key: b
    text: Security controls are assessed with the defined frequency to determine if the controls are effective
      in their application.
    type: narrative
  discussion: Security assessments review systems (hardware, software, and the environment) to assess
    the security controls in the system and identify security-relevant weaknesses and deficiencies. System
    security plans describe the security controls in place, system architecture, and information flows,
    and are a foundation for security assessments. Organizations assess security controls to determine
    the extent to which the controls are implemented correctly, operating as intended, and producing the
    desired outcome.
- id: CA.L2-3.12.2
  seq: 85
  family: CA
  title: Plan of Action
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.12.2; NIST SP 800-171A 3.12.2; CMMC AG L2 v2 CA.L2-3.12.2"
  req: Develop and implement plans of action designed to correct deficiencies and reduce or eliminate
    vulnerabilities in organizational systems.
  objectives:
  - key: a
    text: Deficiencies and vulnerabilities to be addressed by the plan of action are identified.
    type: narrative
    guidance: 'Examine: plan of action and milestones documentation; identified deficiencies; remediation
      schedules.'
  - key: b
    text: A plan of action is developed to correct identified deficiencies and reduce or eliminate identified
      vulnerabilities.
    type: narrative
  - key: c
    text: The plan of action is implemented to correct identified deficiencies and reduce or eliminate
      identified vulnerabilities.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: shared
  discussion: A plan of action and milestones (POA&M) is a key document in the information security program
    and is subject to federal reporting requirements. Organizations develop POA&Ms based on the findings
    from security controls assessments and continuous monitoring activities. The POA&M documents the corrective
    actions planned to address identified deficiencies and the milestones for implementing those corrective
    actions.
- id: CA.L2-3.12.3
  seq: 86
  family: CA
  title: Ongoing Security Monitoring
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.12.3; NIST SP 800-171A 3.12.3; CMMC AG L2 v2 CA.L2-3.12.3"
  req: Monitor security controls on an ongoing basis to ensure the continued effectiveness of the controls.
  objectives:
  - key: a
    text: Security controls are monitored on an ongoing basis to ensure the continued effectiveness of
      those controls.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
    guidance: 'Examine: continuous monitoring strategy; monitoring results; records of security control
      monitoring.'
  discussion: This requirement addresses ongoing monitoring of security controls in organizational systems.
    Security control monitoring involves monitoring the controls employed within and inherited by the
    system to determine if the controls continue to be effective over time given the inevitable changes
    that occur. Security control monitoring is an organizational responsibility that supports the risk
    management process.
- id: CA.L2-3.12.4
  seq: 87
  family: CA
  title: System Security Plan
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.12.4; NIST SP 800-171A 3.12.4; CMMC AG L2 v2 CA.L2-3.12.4"
  req: Develop, document, and periodically update system security plans that describe system boundaries,
    system environments of operation, how security requirements are implemented, and the relationships
    with or connections to other systems.
  objectives:
  - key: a
    text: A system security plan is developed.
    type: narrative
    guidance: 'Examine: system security plan; system boundary documentation; environment of operation
      description.'
  - key: b
    text: The system boundary is described and documented in the system security plan.
    type: narrative
  - key: c
    text: The system environment of operation is described and documented in the system security plan.
    type: scheduled_operation
    cadence: annual
    cadence_resp: shared
  - key: d
    text: The security requirements identified and approved by the designated authority as non-applicable
      are identified.
    type: narrative
  - key: e
    text: The method of security requirement implementation is described and documented in the system
      security plan.
    type: narrative
  - key: f
    text: The relationship with or connection to other systems is described and documented in the system
      security plan.
    type: narrative
  - key: g
    text: The frequency to update the system security plan is defined.
    type: narrative
  - key: h
    text: System security plan is updated with the defined frequency.
    type: narrative
  discussion: System security plans relate security requirements to a set of security controls and contain
    the information needed to implement the controls. System security plans also contain high-level descriptions
    of the technology requirements, hardware and software components, system and communication interfaces,
    and network topology. The contents of system security plans serve as the basis for security assessments.
- id: SC.L2-3.13.1
  seq: 88
  family: SC
  title: Boundary Protection
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.1; NIST SP 800-171A 3.13.1; CMMC AG L2 v2 SC.L2-3.13.1"
  req: Monitor, control, and protect communications (i.e., information transmitted or received by organizational
    systems) at the external boundaries and key internal boundaries of the organizational system.
  objectives:
  - key: a
    text: The external system boundary is defined.
    type: document_list
    guidance: 'Examine: network diagram showing system boundary; boundary protection device configuration;
      firewall rule sets.'
  - key: b
    text: Key internal system boundaries are defined.
    type: product
  - key: c
    text: Communications are monitored at the external system boundary.
    type: product
  - key: d
    text: Communications are monitored at key internal boundaries.
    type: product
  - key: e
    text: Communications are controlled at the external system boundary.
    type: narrative
  - key: f
    text: Communications are controlled at key internal boundaries.
    type: narrative
  - key: g
    text: Communications are protected at the external system boundary.
    type: narrative
  - key: h
    text: Communications are protected at key internal boundaries.
    type: narrative
  discussion: Monitoring, control, and protection of organizational communications at the external boundaries
    and key internal boundaries of information systems includes the use of boundary protection devices
    such as gateways, routers, firewalls, and guards that employ rule sets or configuration settings that
    restrict system services, provide packet-filtering capability based on header information, or provide
    message-filtering capability based on message content.
- id: SC.L2-3.13.2
  seq: 89
  family: SC
  title: Security Engineering
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.13.2; NIST SP 800-171A 3.13.2; CMMC AG L2 v2 SC.L2-3.13.2"
  req: Employ architectural designs, software development techniques, and systems engineering principles
    that promote effective information security within organizational systems.
  objectives:
  - key: a
    text: Architectural designs that promote effective information security are identified.
    type: narrative
    guidance: 'Examine: security architecture documentation; system design documents; software development
      procedures.'
  - key: b
    text: Software development techniques that promote effective information security are identified.
    type: narrative
  - key: c
    text: Systems engineering principles that promote effective information security are identified.
    type: narrative
  - key: d
    text: Identified architectural designs that promote effective information security are employed.
    type: narrative
  - key: e
    text: Identified software development techniques that promote effective information security are employed.
    type: narrative
  - key: f
    text: Identified systems engineering principles that promote effective information security are employed.
    type: narrative
  discussion: Architectural design including resiliency and redundancy may significantly affect the security
    of systems. Organizations consider the system-level design and functions required to fulfill mission/business
    requirements when developing the security architecture. Security architectures address the protection
    needs for the system mission/business processes and the information that flows through those processes,
    including mechanisms to satisfy security requirements.
- id: SC.L2-3.13.3
  seq: 90
  family: SC
  title: Security Function Isolation
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.3; NIST SP 800-171A 3.13.3; CMMC AG L2 v2 SC.L2-3.13.3"
  req: Separate user functionality from system management functionality.
  objectives:
  - key: a
    text: User functionality is identified.
    type: product
    guidance: 'Examine: system design documentation; separation of user and management functionality;
      access control configuration.'
  - key: b
    text: System management functionality is identified.
    type: narrative
  - key: c
    text: User functionality is separated from system management functionality.
    type: narrative
  discussion: Shared resources such as registers, main memory, and mass storage present organizational
    challenges in multi-user environments. This requirement addresses the need to separate user-level
    functionality from system management functionality. The results of not separating user functionality
    from system management functionality are the potential access to privileged information by non-privileged
    users.
- id: SC.L2-3.13.4
  seq: 91
  family: SC
  title: Shared Resource Control
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.4; NIST SP 800-171A 3.13.4; CMMC AG L2 v2 SC.L2-3.13.4"
  req: Prevent unauthorized and unintended information transfer via shared system resources.
  objectives:
  - key: a
    text: Unauthorized and unintended information transfer via shared system resources is prevented.
    type: product
    guidance: 'Examine: shared resource management configuration; evidence of resource purging between
      users.'
  discussion: Preventing unauthorized and unintended information transfer via shared system resources
    addresses the concept of residual information protection. This requirement limits the ability of adversaries
    to exploit information that was left in system resources after processing. Systems should purge or
    overwrite shared resources before reuse to prevent one user's data from being accessible to another
    user.
- id: SC.L2-3.13.5
  seq: 92
  family: SC
  title: Network Segmentation
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.5; NIST SP 800-171A 3.13.5; CMMC AG L2 v2 SC.L2-3.13.5"
  req: Implement subnetworks for publicly accessible system components that are physically or logically
    separated from internal networks.
  objectives:
  - key: a
    text: Publicly accessible system components are identified.
    type: document_list
    guidance: 'Examine: network diagram; list of publicly accessible system components; DMZ configuration.'
  - key: b
    text: Subnetworks for publicly accessible system components are physically or logically separated
      from internal networks.
    type: product
  discussion: Limiting the number of external network connections to information systems reduces the attack
    surface and the opportunity for unauthorized access. Subnetworks for publicly accessible system components
    that are physically or logically separated from internal networks provide an additional layer of protection
    for CUI processed on internal systems. Demilitarized zones (DMZs) are commonly used to implement this
    separation.
- id: SC.L2-3.13.6
  seq: 93
  family: SC
  title: Network Deny by Default
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.13.6; NIST SP 800-171A 3.13.6; CMMC AG L2 v2 SC.L2-3.13.6"
  req: Deny network communications traffic by default and allow network communications traffic by exception
    (i.e., deny all, permit by exception).
  objectives:
  - key: a
    text: Network communications traffic is denied by default.
    type: product
    guidance: 'Examine: firewall configuration; network device rule sets; evidence of deny-by-default
      posture.'
  - key: b
    text: Network communications traffic is allowed by exception.
    type: narrative
  discussion: Preventing unauthorized use of protocol services on information systems reduces the attack
    surface. A deny-by-default posture means that all traffic is blocked unless explicitly permitted.
    This is more restrictive than a permit-by-default posture where traffic is allowed unless explicitly
    blocked. Implementing deny-by-default network communications requires organizations to actively define
    what traffic is permitted.
- id: SC.L2-3.13.7
  seq: 94
  family: SC
  title: Split Tunneling
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.7; NIST SP 800-171A 3.13.7; CMMC AG L2 v2 SC.L2-3.13.7"
  req: Prevent remote devices from simultaneously establishing connections with the system and with resources
    in other domains (i.e., split tunneling).
  objectives:
  - key: a
    text: Remote devices are prevented from simultaneously establishing non-remote connections with the
      system and communicating via some other connection to resources in external networks (i.e., split
      tunneling).
    type: product
    guidance: 'Examine: VPN configuration; remote access policy; evidence that split tunneling is disabled.'
  discussion: Split tunneling refers to the practice of routing some network traffic through a VPN tunnel
    while simultaneously allowing other traffic to route directly to the Internet. This can allow an adversary
    to access the organizational network through the remote device while also allowing the remote device
    to access other Internet resources, bypassing organizational security controls. Preventing split tunneling
    ensures all traffic from remote devices flows through the organizational security controls.
- id: SC.L2-3.13.8
  seq: 95
  family: SC
  title: CUI Encryption in Transit
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.13.8; NIST SP 800-171A 3.13.8; CMMC AG L2 v2 SC.L2-3.13.8"
  req: Implement cryptographic mechanisms to prevent unauthorized disclosure of CUI during transmission
    unless otherwise protected by alternative physical safeguards.
  objectives:
  - key: b
    text: Alternative physical safeguards intended to prevent unauthorized disclosure of CUI are identified.
    type: narrative
    guidance: 'Examine: data in transit protection policy; cryptographic configuration for CUI transmission;
      TLS/IPsec settings.'
  - key: c
    text: Either cryptographic mechanisms or alternative physical safeguards are implemented to prevent
      unauthorized disclosure of CUI during transmission.
    type: narrative
  discussion: This requirement applies to internal and external networks and any system component that
    can transmit information. Communication paths outside the physical protection of controlled boundaries
    are susceptible to both interception and modification. FIPS-validated cryptography provides protection
    against disclosure of information and ensures the integrity of transmitted data. TLS, IPsec, and similar
    protocols are commonly used to implement this requirement.
- id: SC.L2-3.13.9
  seq: 96
  family: SC
  title: Network Connection Termination
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.9; NIST SP 800-171A 3.13.9; CMMC AG L2 v2 SC.L2-3.13.9"
  req: Terminate network connections after a defined period of inactivity.
  objectives:
  - key: a
    text: A period of inactivity to terminate network connections associated with communications sessions
      is defined.
    type: narrative
    guidance: 'Examine: network connection termination policy; documentation of inactivity timeout period.'
  - key: b
    text: Network connections associated with communications sessions are terminated at the end of the
      sessions.
    type: product
  - key: c
    text: Network connections associated with communications sessions are terminated after the defined
      period of inactivity.
    type: narrative
  discussion: Network connections that remain active after a defined period of inactivity expose organizations
    to the risk of session hijacking and unauthorized access. Terminating network connections after a
    period of inactivity reduces this risk. The defined period of inactivity should be based on the sensitivity
    of the information and the threat environment. Automatic termination should be implemented in both
    applications and network infrastructure.
- id: SC.L2-3.13.10
  seq: 97
  family: SC
  title: Cryptographic Key Management
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.10; NIST SP 800-171A 3.13.10; CMMC AG L2 v2 SC.L2-3.13.10"
  req: Establish and manage cryptographic keys for cryptography employed in organizational systems.
  objectives:
  - key: a
    text: Cryptographic keys are established whenever cryptography is employed.
    type: document_list
    guidance: 'Examine: cryptographic key management policy; key inventory; key generation and distribution
      procedures.'
  - key: b
    text: Cryptographic keys are managed whenever cryptography is employed.
    type: narrative
  discussion: The term cryptographic key management refers to procedures and mechanisms for managing the
    complete life cycle of cryptographic keys including generation, distribution, storage, use, revocation,
    and destruction. The procedures and mechanisms should provide effective controls and key protections
    throughout the key life cycle. Organizations should use key management solutions that are consistent
    with NIST guidance.
- id: SC.L2-3.13.11
  seq: 98
  family: SC
  title: FIPS-Validated Cryptography
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.13.11; NIST SP 800-171A 3.13.11; CMMC AG L2 v2 SC.L2-3.13.11"
  req: Employ FIPS-validated cryptography when used to protect the confidentiality of CUI.
  objectives:
  - key: a
    text: FIPS-validated cryptography is employed to protect the confidentiality of CUI.
    type: product
    guidance: 'Examine: cryptographic configuration; FIPS validation certificates; evidence of FIPS-validated
      module use.'
  discussion: Cryptography can be employed to support many security solutions including the protection
    of CUI, the provision of digital signatures, and the enforcement of information separation. The strength
    of a cryptographic mechanism is characterized by the associated key length, algorithm, and implementation.
    FIPS-validated cryptographic modules ensure that cryptographic implementations meet established security
    requirements.
- id: SC.L2-3.13.12
  seq: 99
  family: SC
  title: Collaborative Computing
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.12; NIST SP 800-171A 3.13.12; CMMC AG L2 v2 SC.L2-3.13.12"
  req: Prohibit remote activation of collaborative computing devices and provide indication of use to
    users present at the device.
  objectives:
  - key: a
    text: Collaborative computing devices are identified.
    type: product
    guidance: 'Examine: collaborative computing device inventory; configuration preventing remote activation.'
  - key: b
    text: Collaborative computing devices provide indication to users of devices in use.
    type: product
  - key: c
    text: Remote activation of collaborative computing devices is prohibited.
    type: narrative
  discussion: Collaborative computing devices include networked whiteboards, cameras, and microphones.
    Explicit indication of use includes signals to users when collaborative computing devices are activated.
    Remote activation of collaborative computing devices without the knowledge of users present at those
    devices could enable adversaries to capture sensitive information. Physical indicators such as lights
    or auditory signals may be used to provide indication of use.
- id: SC.L2-3.13.13
  seq: 100
  family: SC
  title: Mobile Code
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.13; NIST SP 800-171A 3.13.13; CMMC AG L2 v2 SC.L2-3.13.13"
  req: Control and monitor the use of mobile code.
  objectives:
  - key: a
    text: Use of mobile code is controlled.
    type: product
    guidance: 'Examine: mobile code policy; configuration of mobile code controls; monitoring records
      for mobile code.'
  - key: b
    text: Use of mobile code is monitored.
    type: product
  discussion: Mobile code refers to programs, applets, scripts, and other code that can be downloaded
    from a location across the network and executed locally. Mobile code technologies include Java, ActiveX,
    and Flash. Mobile code exploits represent a significant threat to systems and data. Organizations
    limit the use of mobile code by establishing filtering policies and applying those policies to the
    execution of mobile code in system environments.
- id: SC.L2-3.13.14
  seq: 101
  family: SC
  title: VoIP Control
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.14; NIST SP 800-171A 3.13.14; CMMC AG L2 v2 SC.L2-3.13.14"
  req: Control and monitor the use of Voice over Internet Protocol (VoIP) technologies.
  objectives:
  - key: a
    text: Use of Voice over Internet Protocol (VoIP) technologies is controlled.
    type: product
    guidance: 'Examine: VoIP policy; VoIP system configuration; VoIP monitoring configuration and records.'
  - key: b
    text: Use of Voice over Internet Protocol (VoIP) technologies is monitored.
    type: product
  discussion: VoIP technologies can reduce communications costs and enhance functionality. The use of
    VoIP technologies also presents risks to organizations including eavesdropping, service disruption,
    and toll fraud. Organizations select appropriate protective measures to reduce VoIP security risks.
    This requirement addresses the control and monitoring of VoIP technologies to ensure they are used
    in a manner consistent with organizational security policies.
- id: SC.L2-3.13.15
  seq: 102
  family: SC
  title: Communications Session Authenticity
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.13.15; NIST SP 800-171A 3.13.15; CMMC AG L2 v2 SC.L2-3.13.15"
  req: Protect the authenticity of communications sessions.
  objectives:
  - key: a
    text: The authenticity of communications sessions is protected.
    type: product
    guidance: 'Examine: communications session protection configuration; TLS or SSH configuration; session
      management settings.'
  discussion: Protecting the authenticity of communications sessions involves ensuring that session identifiers
    are unique, that session tokens cannot be predicted or reused, and that the source and integrity of
    communications are verifiable. Mechanisms for protecting session authenticity include cryptographic
    protocols such as TLS and SSH that provide session authentication. Session fixation attacks and session
    hijacking are examples of threats addressed by this requirement.
- id: SC.L2-3.13.16
  seq: 103
  family: SC
  title: CUI at Rest
  weight: 1
  source: "NIST SP 800-171 Rev 2 \xA73.13.16; NIST SP 800-171A 3.13.16; CMMC AG L2 v2 SC.L2-3.13.16"
  req: Protect the confidentiality of CUI at rest.
  objectives:
  - key: a
    text: The confidentiality of CUI at rest is protected.
    type: product
    guidance: 'Examine: data-at-rest encryption configuration; FIPS validation for storage encryption;
      encrypted storage inventory.'
  discussion: Protecting the confidentiality of CUI at rest involves using encryption, access controls,
    and physical security to prevent unauthorized access to stored CUI. FIPS-validated encryption should
    be used when implementing this requirement. CUI at rest includes CUI stored on servers, workstations,
    mobile devices, removable media, and backup storage. Organizations consider the full range of locations
    where CUI may be stored when implementing this requirement.
- id: SI.L2-3.14.1
  seq: 104
  family: SI
  title: Flaw Remediation
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.14.1; NIST SP 800-171A 3.14.1; CMMC AG L2 v2 SI.L2-3.14.1"
  req: Identify, report, and correct information and information system flaws in a timely manner.
  objectives:
  - key: a
    text: The time within which to identify system flaws is specified.
    type: product
    guidance: 'Examine: flaw remediation policy; vulnerability scan results; patch management records.'
  - key: b
    text: System flaws are identified within the specified time frame.
    type: narrative
  - key: c
    text: The time within which to report system flaws is specified.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
  - key: d
    text: System flaws are reported within the specified time frame.
    type: narrative
  - key: e
    text: The time within which to correct system flaws is specified.
    type: narrative
  - key: f
    text: System flaws are corrected within the specified time frame.
    type: narrative
  discussion: This requirement addresses the identification, reporting, and correction of information
    and information system flaws. Flaw remediation includes software patches, hot fixes, firmware updates,
    and other types of updates that address security vulnerabilities. Security-relevant software includes
    audit tools, patch management tools, anti-virus software, and products used to process or present
    organizational data. Time frames for identification, reporting, and correction are specified based
    on risk.
- id: SI.L2-3.14.2
  seq: 105
  family: SI
  title: Malicious Code Protection
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.14.2; NIST SP 800-171A 3.14.2; CMMC AG L2 v2 SI.L2-3.14.2"
  req: Provide protection from malicious code at appropriate locations within organizational systems.
  objectives:
  - key: a
    text: Designated locations for malicious code protection are identified.
    type: product
    guidance: 'Examine: malicious code protection policy; anti-malware deployment locations; configuration
      of protection mechanisms.'
  - key: b
    text: Protection from malicious code at designated locations is provided.
    type: product
  discussion: Information system security depends in part on the use of malicious code protections. Malicious
    code includes viruses, worms, Trojan horses, and spyware. Organizations use malicious code protection
    mechanisms to address these threats at entry and exit points and within the system. A variety of technologies
    and methods are available to limit or eliminate the effects of malicious code, including real-time
    scanning, heuristic analysis, and sandboxing.
- id: SI.L2-3.14.3
  seq: 106
  family: SI
  title: Security Alerts
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.14.3; NIST SP 800-171A 3.14.3; CMMC AG L2 v2 SI.L2-3.14.3"
  req: Monitor system security alerts and advisories and take action in response.
  objectives:
  - key: a
    text: Response actions to system security alerts and advisories are identified.
    type: product
    guidance: 'Examine: security alert monitoring process; subscription to CISA/US-CERT alerts; records
      of alert review.'
  - key: b
    text: System security alerts and advisories are monitored.
    type: narrative
  - key: c
    text: Actions in response to system security alerts and advisories are taken.
    type: narrative
  discussion: The frequency of security alert and advisory review is organization-defined. Organizations
    should keep current on the latest threat information from CISA, US-CERT, NIST, and commercial vendors.
    Security alerts and advisories provide information about newly discovered vulnerabilities and recommended
    actions to address those vulnerabilities. Acting on security alerts and advisories in a timely manner
    reduces the window of vulnerability.
- id: SI.L2-3.14.4
  seq: 107
  family: SI
  title: Malicious Code Update
  weight: 5
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.14.4; NIST SP 800-171A 3.14.4; CMMC AG L2 v2 SI.L2-3.14.4"
  req: Update malicious code protection mechanisms when new releases are available.
  objectives:
  - key: a
    text: Malicious code protection mechanisms are updated when new releases are available.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
    guidance: 'Examine: malicious code protection update policy; records of definition and engine updates;
      update logs.'
  discussion: Software patches and updates address a wide range of vulnerabilities. Organizations identify,
    assess, and implement patches and updates as a matter of normal system operations. Patch management
    processes address the timeliness of patch application and the mechanisms used for determining patch
    applicability to organizational systems. Malicious code protection mechanisms should be updated promptly
    when new releases are available from vendors.
- id: SI.L2-3.14.5
  seq: 108
  family: SI
  title: System Scanning
  weight: 3
  level: 1
  source: "NIST SP 800-171 Rev 2 \xA73.14.5; NIST SP 800-171A 3.14.5; CMMC AG L2 v2 SI.L2-3.14.5"
  req: Perform periodic scans of organizational systems and real-time scans of files from external sources
    as files are downloaded, opened, or executed.
  objectives:
  - key: a
    text: The frequency for malicious code scans is defined.
    type: scheduled_operation
    cadence: monthly
    cadence_resp: msp
    guidance: 'Examine: scan policy; documentation of scan frequency; evidence of real-time scanning for
      external files.'
  - key: b
    text: Malicious code scans are performed with the defined frequency.
    type: product
  - key: c
    text: Real-time malicious code scans of files from external sources as files are downloaded, opened,
      or executed are performed.
    type: narrative
  discussion: Malicious code can be embedded in software programs and may attempt to modify information,
    disable security functions, or compromise access control mechanisms. Performing periodic scans of
    organizational systems and real-time scans of files from external sources as files are downloaded,
    opened, or executed helps detect malicious code before it can execute. Both scheduled and real-time
    scans contribute to an effective malicious code protection posture.
- id: SI.L2-3.14.6
  seq: 109
  family: SI
  title: Security Monitoring
  weight: 5
  source: "NIST SP 800-171 Rev 2 \xA73.14.6; NIST SP 800-171A 3.14.6; CMMC AG L2 v2 SI.L2-3.14.6"
  req: Monitor organizational systems, including inbound and outbound communications traffic, to detect
    attacks and indicators of potential attacks.
  objectives:
  - key: a
    text: The system is monitored to detect attacks and indicators of potential attacks.
    type: product
    guidance: 'Examine: network monitoring configuration; IDS/IPS deployment; monitoring scope and coverage
      documentation.'
  - key: b
    text: Inbound communications traffic is monitored to detect attacks and indicators of potential attacks.
    type: product
  - key: c
    text: Outbound communications traffic is monitored to detect attacks and indicators of potential attacks.
    type: scheduled_operation
    cadence: quarterly
    cadence_resp: msp
  discussion: Network monitoring involves monitoring network traffic to detect adversarial activity. This
    monitoring can be of great importance when other monitoring mechanisms are not possible or unavailable.
    Network intrusion detection systems can detect malicious activity by pattern matching, anomaly detection,
    and hybrid approaches. Organizations monitor both inbound and outbound traffic to detect attacks and
    potential indicators of compromise.
- id: SI.L2-3.14.7
  seq: 110
  family: SI
  title: Identify Unauthorized Use
  weight: 3
  source: "NIST SP 800-171 Rev 2 \xA73.14.7; NIST SP 800-171A 3.14.7; CMMC AG L2 v2 SI.L2-3.14.7"
  req: Identify unauthorized use of organizational systems.
  objectives:
  - key: a
    text: Authorized use of the system is defined.
    type: product
    guidance: 'Examine: authorized use documentation; monitoring configuration; records of unauthorized
      use detection.'
  - key: b
    text: Unauthorized use of the system is identified.
    type: narrative
  discussion: System monitoring capabilities within organizations can identify unauthorized applications,
    connections, and data transfers. The monitoring of local, network, and remote connections is necessary
    to detect if the system has been compromised. Event monitoring using automated tools is commonly used
    to monitor systems. Organizations define the rules and thresholds that determine what constitutes
    unauthorized use of the system.
