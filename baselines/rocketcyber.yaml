# WinGRC product baseline library entry
# Generated by the document-ingestion pass from two source docs.
# This is a CANDIDATE mapping for engineer review — nothing here is "met"
# until the customer's configuration is confirmed and evidence is attached.

product:
  key: rocketcyber
  name: RocketCyber Managed SIEM + SOC
  provider: Kaseya
  category: ESP            # external service provider
  asset_type: SPA          # security protection asset
  framework: "NIST 800-171 Rev 2 / CMMC L2"
  role: >
    Authoritative SIEM and 24/7 managed SOC. Aggregates endpoint, firewall,
    identity, and SaaS telemetry; Kaseya SOC triages and escalates to the MSP.
  assumed_config:           # from the MSP baseline doc
    - "Agent deployed to all in-scope endpoints/servers via Datto RMM onboarding job"
    - "Detection sources: Windows Event Log, M365/Entra (SaaS Alerts), FortiGate syslog, Heimdal EDR/DNS, FenixPyre file audit"
    - "Archival retention >= 365 days (DFARS/CMMC); data in RocketCyber cloud"
    - "Admin access via KaseyaOne SSO + MFA, least-privilege roles (analyst/admin/read-only)"
    - "Platform audit log enabled; annual log-source review per Audit Log Process Review Procedure"
  source_docs:
    - "RocketCyber_SIEM_and_SOC_Baseline.docx (Winsors Labs MSP baseline, v1.0)"
    - "RocketCyber Customer Responsibility Matrix, ControlCase/Kaseya v1.0 (NIST 800-171 r2)"

# Each control carries a CLASSIFICATION that drives how the engine treats it:
#   provider_satisfies  -> RocketCyber materially meets this for in-scope assets;
#                          flip to "shared, pending evidence" and queue evidence.
#   shared              -> provider enables, customer owns a configurable half.
#   customer_owns       -> the CRM says the product does NOT do this; the
#                          customer's IdP/systems do. DO NOT credit RocketCyber.
controls:

  # ---- Access Control: scoped to the RocketCyber portal, not customer CUI assets ----
  - control: AC.L2-3.1.1
    objectives: [a, b, c, d, e, f]
    classification: shared
    provider_contribution: "SSO (KaseyaOne) + RBAC for portal access; agents scope reachable systems."
    customer_action: "Bind SSO to customer IdP; provision users there; deploy agents only to authorized systems."
    scope_note: "Satisfies access control FOR the RocketCyber platform. Customer CUI assets need their own AC controls."
    evidence:
      - { artifact: "KaseyaOne SSO enabled + bound to customer IdP", type: screenshot, kb: "Enabling SSO Login with KaseyaOne" }
      - { artifact: "Portal user/role list", type: export, kb: "Identity and Access Management" }
    candidate_state: pending_evidence

  - control: AC.L2-3.1.2
    objectives: [a, b]
    classification: shared
    provider_contribution: "Default roles (Owner, Incident Responder, Reviewer) with scoped permissions."
    customer_action: "Assign users to roles per operational need."
    evidence:
      - { artifact: "Portal role assignments", type: screenshot, kb: "Identity and Access Management" }
    candidate_state: pending_evidence

  - control: AC.L2-3.1.5
    objectives: [a, b, c, d]
    classification: shared
    provider_contribution: "RBAC supports least privilege; portal use designated a security function."
    customer_action: "Identify privileged accounts; assign per least privilege."
    candidate_state: pending_evidence

  - control: AC.L2-3.1.8
    objectives: [a, b]
    classification: customer_owns
    note: "Logon attempt limits are enforced by the customer IdP. RocketCyber supplies SSO only."
    candidate_state: not_satisfied_by_product

  - control: AC.L2-3.1.11
    objectives: [a, b]
    classification: provider_satisfies
    provider_contribution: "Configurable session-termination-on-inactivity setting in the portal."
    customer_action: "Set the inactivity threshold value."
    evidence:
      - { artifact: "Session timeout configuration", type: screenshot, kb: "Identity and Access Management" }
    candidate_state: pending_evidence

  # ---- Awareness & Training ----
  - control: AT.L2-3.2.2
    objectives: [c]                       # [a],[b] are customer-owned (role definition/assignment)
    classification: shared
    provider_contribution: "Provides product training material (KB) that may support customer training."
    customer_action: "Define security roles, assign personnel, ensure training completion."
    evidence:
      - { artifact: "RocketCyber KB / training references", type: link, kb: "RocketCyber KB Home" }
    candidate_state: pending_evidence

  # ---- Audit & Accountability: RocketCyber is the authoritative tool (MSP baseline) ----
  - control: AU.L2-3.3.1
    objectives: [a, b, c, d, e, f]
    classification: provider_satisfies
    provider_contribution: "Portal generates audit records for defined event types; 1-year retention."
    customer_action: "Configure agents to capture required event types/fields on customer systems."
    evidence:
      - { artifact: "Defined event types + captured fields", type: screenshot, kb: "Configuring the Syslog Collector" }
      - { artifact: "Retention policy (>= 1 year)", type: screenshot, kb: "Configuring the Syslog Collector" }
    candidate_state: pending_evidence

  - control: AU.L2-3.3.2
    objectives: [a, b]
    classification: provider_satisfies
    provider_contribution: "Records include user identifiers, timestamps, contextual metadata (user-to-action traceability)."
    candidate_state: pending_evidence

  - control: AU.L2-3.3.3
    objectives: [a, b, c]
    classification: shared
    provider_contribution: "Annual review of portal event types; updates configuration on findings."
    customer_action: "Define and run periodic review of agent-captured event types (Audit Log Process Review Procedure)."
    candidate_state: pending_evidence

  - control: AU.L2-3.3.8
    objectives: [a, b, c, d, e, f]
    classification: provider_satisfies
    provider_contribution: "RBAC + encryption, write-once + integrity checks, retention/privilege controls on portal logs."
    customer_action: "Protect customer-side/system-generated logs equivalently."
    candidate_state: pending_evidence

  # ---- Configuration Management ----
  - control: CM.L2-3.4.2
    objectives: [a, b]
    classification: shared
    provider_contribution: "Exposes configurable security settings; mechanisms support enforcement."
    customer_action: "Establish and enforce the security configuration (this baseline doc is the artifact)."
    evidence:
      - { artifact: "RocketCyber baseline doc (this document)", type: document }
    candidate_state: pending_evidence

  # ---- Identification & Authentication: CUSTOMER IdP owns these. DO NOT CREDIT. ----
  - control: [IA.L2-3.5.1, IA.L2-3.5.2, IA.L2-3.5.3, IA.L2-3.5.4, IA.L2-3.5.5, IA.L2-3.5.6, IA.L2-3.5.7, IA.L2-3.5.8, IA.L2-3.5.9, IA.L2-3.5.10, IA.L2-3.5.11]
    classification: customer_owns
    note: >
      The CRM states across the entire IA family that RocketCyber does NOT
      identify users/devices, does NOT enforce MFA, password complexity,
      history, reuse, identifier lifecycle, or transmission protection — the
      customer's identity source does. These are routed to whichever product
      actually owns identity (e.g., Entra ID / DUO), NOT credited to RocketCyber.
    candidate_state: not_satisfied_by_product

  # ---- Incident Response: RocketCyber is the SOC (MSP baseline) ----
  - control: IR.L2-3.6.1
    objectives: [a, b, c, d, e, f, g]
    classification: provider_satisfies
    provider_contribution: "24/7 SOC: preparation, detection, analysis, containment guidance, recovery recommendations."
    customer_action: "Deploy/configure agents; execute containment in own environment; coordinate response."
    evidence:
      - { artifact: "Managed SOC service description / SOC coverage", type: document, kb: "Managed SOC Overview" }
      - { artifact: "Sample incident ticket with analyst notes (sanitized)", type: export }
    candidate_state: pending_evidence

  # ---- Maintenance ----
  - control: MA.L2-3.7.1
    objectives: [a]
    classification: shared
    provider_contribution: "Auto-updates the agent as lifecycle management."
    customer_action: "Maintain the host (OS patching, host-level security)."
    candidate_state: pending_evidence

  # ---- System & Communications Protection ----
  - control: SC.L2-3.13.15
    objectives: [a]
    classification: provider_satisfies
    provider_contribution: "Secure, authenticated comms agent<->portal and customer<->portal."
    customer_action: "None unless integrating third-party systems/proxies."
    candidate_state: pending_evidence

  # ---- System & Information Integrity: monitoring is RocketCyber (MSP baseline) ----
  - control: SI.L2-3.14.1
    objectives: [a, b, c, d, e, f]
    classification: shared
    provider_contribution: "Identifies/reports/remediates flaws in the agent on defined SLAs; auto-updates agent."
    customer_action: "Identify/report/remediate flaws in host systems on own timelines."
    candidate_state: pending_evidence

  - control: SI.L2-3.14.6
    objectives: [a, b, c]
    classification: provider_satisfies
    provider_contribution: "SOC continuously monitors agent telemetry; inbound/outbound firewall traffic when fed."
    customer_action: "Install/configure agents; route firewall logs to RocketCyber."
    evidence:
      - { artifact: "Agent coverage list (all in-scope CUI assets reporting)", type: export, kb: "Managed SOC Overview" }
      - { artifact: "FortiGate -> RocketCyber syslog integration", type: screenshot, kb: "Firewall Integration" }
    candidate_state: pending_evidence

# Roll-up the engine produces for the assessment view:
summary:
  provider_satisfies: [AC.L2-3.1.11, AU.L2-3.3.1, AU.L2-3.3.2, AU.L2-3.3.8, IR.L2-3.6.1, SC.L2-3.13.15, SI.L2-3.14.6]
  shared:             [AC.L2-3.1.1, AC.L2-3.1.2, AC.L2-3.1.5, AT.L2-3.2.2, AU.L2-3.3.3, CM.L2-3.4.2, MA.L2-3.7.1, SI.L2-3.14.1]
  customer_owns:      [AC.L2-3.1.8, "IA.L2-3.5.1..3.5.11"]
  note: >
    RocketCyber is the authoritative tool for the Audit (AU), Incident Response
    (IR), and Monitoring (SI.3.14.6) clusters in this stack. It is explicitly
    NOT the control owner for the Identification & Authentication (IA) family —
    a naive "select tool -> mark controls met" tool would wrongly credit those.
