# nginx: sole host-facing entry point for a WinGRC deployment.
#
# Before deploying, replace every YOUR_HOSTNAME below with the real hostname
# (see docs/deployment.md). Two names are required, both pointed at this
# server and both covered by the same certificate:
#   - YOUR_HOSTNAME            the app itself (frontend + /api -> backend)
#   - storage.YOUR_HOSTNAME    evidence/logo downloads, proxied to MinIO
#
# Why a separate subdomain for storage, not a path like /storage/ on the
# main hostname: evidence/logo download links are S3 presigned URLs, signed
# by the backend (boto3) against a specific host + exact path. MinIO's own
# bucket routing needs the unprefixed path (/bucket/key) to resolve the
# right object, so nginx can't strip a path prefix without breaking the
# signature, and can't leave a prefix in place without breaking MinIO's
# routing. A dedicated subdomain avoids the conflict: the path MinIO
# receives is always exactly /bucket/key, matching what was signed.
# (Verified against current boto3/botocore presigned-URL behavior — see the
# commit introducing this file for the offline check.)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_HOSTNAME storage.YOUR_HOSTNAME;

    # DNS-01 challenges don't need anything served over HTTP — this block
    # exists purely to redirect stray HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

# Main application: frontend production build + reverse-proxied API.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_HOSTNAME;

    ssl_certificate     /etc/letsencrypt/live/YOUR_HOSTNAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_HOSTNAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS is a deliberate follow-up, not enabled on this first pass — see
    # docs/deployment.md. Turning it on before HTTPS has proven stable risks
    # locking out access on a cert hiccup: browsers cache HSTS and ignore
    # plain-HTTP fallback for the max-age duration, with no server-side way
    # to un-cache it early.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Evidence/logo downloads: browsers hit MinIO presigned URLs directly on
# this subdomain. Path and Host header must reach MinIO unmodified — see
# the file-level comment above for why.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name storage.YOUR_HOSTNAME;

    ssl_certificate     /etc/letsencrypt/live/YOUR_HOSTNAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_HOSTNAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
