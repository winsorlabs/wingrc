name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Test
        working-directory: backend
        run: pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: wingrc
          POSTGRES_PASSWORD: wingrc
          POSTGRES_DB: wingrc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      WINGRC_DATABASE_URL: postgresql+psycopg://wingrc:wingrc@localhost:5432/wingrc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Migration chain (upgrade → downgrade → upgrade)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Integration tests
        working-directory: backend
        run: pytest -q -m integration

  image:
    runs-on: ubuntu-latest
    needs: [backend, integration]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t wingrc-backend:ci -f backend/Dockerfile .
      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wingrc-backend:ci
          format: table
          exit-code: "0"   # report-only for now; flip to "1" to gate
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: wingrc-backend:ci
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
