services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: wingrc
      POSTGRES_PASSWORD: wingrc
      POSTGRES_DB: wingrc
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wingrc"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for evidence. Same code path targets Azure
  # Blob or AWS S3 in the cloud; MinIO keeps self-host and air-gapped simple.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wingrc
      MINIO_ROOT_PASSWORD: wingrc-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WINGRC_DATABASE_URL: postgresql+psycopg://wingrc:wingrc@db:5432/wingrc
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # --reload picks up host edits without a rebuild (volume mount keeps /app in sync).
    command: >
      sh -c "alembic upgrade head &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
  minio_data:
